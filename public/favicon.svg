<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="blobGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a8ff78"/>
      <stop offset="100%" stop-color="#3a9e4a"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccffcc"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Blob body — morphs shape -->
  <path filter="url(#glow)" fill="url(#blobGrad)">
    <animate attributeName="d" dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="
        M16,4 C21,3 27,7 28,12 C30,17 28,23 23,26 C18,29 10,29 7,25 C3,21 3,15 5,10 C7,5 11,5 16,4 Z;
        M16,3 C22,4 28,8 27,14 C26,20 22,27 17,28 C12,29 6,25 5,19 C4,13 6,6 11,4 C13,3 14,3 16,3 Z;
        M16,4 C21,3 27,7 28,12 C30,17 28,23 23,26 C18,29 10,29 7,25 C3,21 3,15 5,10 C7,5 11,5 16,4 Z
      "
    />
    <!-- Subtle vertical bounce -->
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
  </path>

  <!-- Left eye white -->
  <ellipse cx="12" cy="14" rx="2.5" ry="2.8" fill="url(#eyeGlow)">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
    <animate attributeName="ry" dur="1.8s" repeatCount="indefinite"
      values="2.8; 0.4; 2.8" keyTimes="0; 0.5; 1" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </ellipse>
  <!-- Left pupil -->
  <ellipse cx="12.5" cy="14.5" rx="1.2" ry="1.3" fill="#0f0f1e">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
    <animate attributeName="ry" dur="1.8s" repeatCount="indefinite"
      values="1.3; 0.2; 1.3" keyTimes="0; 0.5; 1" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </ellipse>
  <!-- Left shine -->
  <circle cx="11.5" cy="13.4" r="0.5" fill="white" opacity="0.95">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
  </circle>

  <!-- Right eye white -->
  <ellipse cx="20" cy="14" rx="2.5" ry="2.8" fill="url(#eyeGlow)">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
    <animate attributeName="ry" dur="1.8s" repeatCount="indefinite"
      values="2.8; 0.4; 2.8" keyTimes="0; 0.5; 1" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </ellipse>
  <!-- Right pupil -->
  <ellipse cx="20.5" cy="14.5" rx="1.2" ry="1.3" fill="#0f0f1e">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
    <animate attributeName="ry" dur="1.8s" repeatCount="indefinite"
      values="1.3; 0.2; 1.3" keyTimes="0; 0.5; 1" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </ellipse>
  <!-- Right shine -->
  <circle cx="19.5" cy="13.4" r="0.5" fill="white" opacity="0.95">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
  </circle>

  <!-- Smile -->
  <path d="M13 19.5 Q16 22 19 19.5" stroke="#0f0f1e" stroke-width="1.3"
    fill="none" stroke-linecap="round">
    <animateTransform attributeName="transform" type="translate"
      dur="1.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="0,0; 0,-1.5; 0,0"/>
  </path>
</svg>
