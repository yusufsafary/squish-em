function resize() {

  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W * scale + 'px';

function resumeAC() { if (AC.state === 'suspended') AC.resume(); }

function beep(freq, type, dur, vol=0.3, detune=0) {
  if (AC.state==='suspended') return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}

// ─── Blob smooth shape helpers ───────────────────────────────────────────────
function makeBlobPts(n=8) {
  return Array.from({length:n},(_,i)=>{
    const r=0.85+Math.random()*0.3;
    return {angle:(i/n)*Math.PI*2, r, rTarget:r, rSpeed:0.01+Math.random()*0.018};
  });
}
function updateBlobPts(pts) {
  pts.forEach(p=>{
    p.r += (p.rTarget - p.r)*p.rSpeed;
    if(Math.abs(p.r-p.rTarget)<0.012) p.rTarget=0.72+Math.random()*0.56;
  });
}
function pathBlob(cx,cy,pts,rot,rx,ry){
  const n=pts.length;
  const coords=pts.map(p=>({
    x:cx+Math.cos(p.angle+rot)*rx*p.r,
    y:cy+Math.sin(p.angle+rot)*ry*p.r,
  }));
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const prev=coords[(i-1+n)%n], curr=coords[i], next=coords[(i+1)%n], next2=coords[(i+2)%n];
    if(i===0)ctx.moveTo(curr.x,curr.y);
    const cp1x=curr.x+(next.x-prev.x)/6, cp1y=curr.y+(next.y-prev.y)/6;
    const cp2x=next.x-(next2.x-curr.x)/6, cp2y=next.y-(next2.y-curr.y)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,next.x,next.y);
  }
  ctx.closePath();
}

function availTypes(){
  const t=['green'];
  if(level>=3)t.push('blue');
  if(level>=4)t.push('phantom');
  if(level>=5)t.push('red');
  if(level>=7)t.push('gold');

}

function spawnBlob(){

  const cap=level>=10?12:level>=5?8:5;
  if(blobs.length>=cap) return;
  const types=availTypes();
  const weights=types.map(t=>BT[t].sw);
  const tot=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,cum=0,chosen='green';
  for(let i=0;i<types.length;i++){cum+=weights[i];if(r<=cum){chosen=types[i];break;}}
  const bt=BT[chosen];
  const spdScale=1+Math.floor(kills/10)*.1;
  const spd=Math.min(bt.spd*spdScale,bt.spd*3)*DIFF_SPD[difficulty];

  return {x,y,vx,vy:vy-spd,r,trail:[],pierce:upgrades.pierce,pierced:0,expl:upgrades.explosive};
}

    for(const a of[-0.22,0,0.22])

    bullets.push(makeBullet(tip.x,tip.y,-2.8,-13));

    bullets.push(makeBullet(tip.x,tip.y,0,-13));

const STREAK_MSGS=['','','DOUBLE KILL!','TRIPLE KILL!','QUAD KILL!','RAMPAGE!!','GODLIKE!!!'];
function addKill(pts,x,y,player=1){
  combo++; comboTimer=1.6;
  const prevMult=comboMult;
  comboMult=combo>=6?4:combo>=4?3:combo>=3?2:combo>=2?1.5:1;
  if(comboMult>prevMult)sfxCombo(combo);
  const basePts=Math.floor(pts*comboMult*(mxActive?2:1));
  const isCrit=Math.random()<0.12;
  const total=isCrit?Math.floor(basePts*2.5):basePts;
  if(isCrit){ spawnPopup(x,y+22,'CRIT!','#FF4500'); beep(1400,'sine',0.06,0.18); }
  if(player===2)score2+=total; else score+=total;
  kills++; lvlKills++;
  spawnPopup(x,y,'+'+total,isCrit?'#FF8C00':'#FFD93D');
  if(comboMult>1) spawnPopup(x,y-30,'×'+comboMult,'#FF6B6B');

  // Streak announcements
  streakCount++; streakTimer=1.5;
  if(streakCount>=2){
    const idx=Math.min(streakCount,STREAK_MSGS.length-1);
    if(STREAK_MSGS[idx]) spawnPopup(W/2,H/2-50,STREAK_MSGS[idx],'#FFD93D');
  }

  // Achievements
  if(kills===1) unlockAch('first_blood');
  if(comboMult>=4) unlockAch('combo_god');
  if(score>=1000) unlockAch('centurion');
  if(level>=5&&lvlKills===0&&!bossPresent) unlockAch('speed_run');

  // Score milestone popups
  const milestones=[500,1000,2500,5000,10000,25000,50000];
  for(const m of milestones){
    if(score>=m&&prevScoreMilestone<m){
      prevScoreMilestone=m;
      const k=m>=1000?(m/1000+'K'):''+m;
      spawnPopup(W/2,H/2+70,'🎯 '+k+'!','#FFD93D');
      beep(660,'sine',0.14,0.2); beep(880,'sine',0.12,0.18);
      screenFlash(0.28,'#FFD93D');
      if(m%2500===0&&lives<5){lives++;spawnPopup(W/2,H/2-80,'❤ +1 LIFE!','#FF6B6B');beep(880,'sine',0.12,0.2);screenFlash(0.3,'#FF6B6B');}
      break;
    }
  }

  if(lvlKills>=KILLS_PER_LEVEL){
    level++; lvlKills=0; sfxLevelUp();
    levelFlashTimer=1.8; levelFlashNum=level;
    if(level%5===0&&!bossPresent) spawnBoss();
    showUpgradeScreen();
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
function cpos(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:(cx-r.left)/scale, y:(cy-r.top)/scale};
}
function pDown(x,y){
  resumeAC();
  if(screen===SCR.TITLE){
    // Check difficulty buttons first
    for(let i=0;i<diffBtnRects.length;i++){
      const r=diffBtnRects[i];
      if(r&&x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h){
        difficulty=i; localStorage.setItem('squish_diff',i); return;
      }
    }
    const mr=modeBtnRect;
    if(mr.w&&x>=mr.x&&x<=mr.x+mr.w&&y>=mr.y&&y<=mr.y+mr.h){gameMode=1;}
    else{gameMode=0;}
    startGame();return;
  }
  if(screen===SCR.PAUSE||screen===SCR.OVER)return;
  if(gameMode===1){
    // Split canvas: left=P1, right=P2
    if(x<W/2){dragOn=true;dragOff=x-cannonX;}
    else{p2DragOn=true;p2DragOff=x-cannonX2;}
    return;
  }
  // Solo: Left/right buttons zone
  if(y>RAIL_Y+14&&y<RAIL_Y+80){
    if(x<W/2){leftBtn=true;return;}else{rightBtn=true;return;}
  }
  dragOn=true;dragOff=x-cannonX;
}
function pMove(x){
  if(dragOn) cannonX=Math.max(22,Math.min(gameMode===1?W/2-22:W-22,x-dragOff));
  if(p2DragOn) cannonX2=Math.max(gameMode===1?W/2+22:22,Math.min(W-22,x-p2DragOff));
}
function pUp(){dragOn=false;leftBtn=false;rightBtn=false;p2DragOn=false;p2LeftBtn=false;p2RightBtn=false;}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pDown(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pMove(p.x);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();pUp();
  if(e.changedTouches.length){const t=e.changedTouches[0],p=cpos(t.clientX,t.clientY);handleClick(p.x,p.y);}
},{passive:false});
canvas.addEventListener('mousedown', e=>{const p=cpos(e.clientX,e.clientY);pDown(p.x,p.y);});
canvas.addEventListener('mousemove', e=>{const p=cpos(e.clientX,e.clientY);pMove(p.x);});
canvas.addEventListener('mouseup',   pUp);
canvas.addEventListener('click',     e=>{const p=cpos(e.clientX,e.clientY);handleClick(p.x,p.y);});

function handleClick(x,y){
  const hit=r=>r&&x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;
  if(screen===SCR.OVER){if(hit(btnRects.again))startGame();if(hit(btnRects.menu))screen=SCR.TITLE;}
  if(screen===SCR.PAUSE){if(hit(btnRects.resume))screen=SCR.GAME;if(hit(btnRects.menuP))screen=SCR.TITLE;}
  if(screen===SCR.UPGRADE){
    for(let i=0;i<upgCardRects.length;i++){
      if(hit(upgCardRects[i])){applyUpgrade(upgradeCards[i]);return;}
    }
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')leftBtn=true;
  if(e.key==='ArrowRight')rightBtn=true;
  if(e.key==='a'||e.key==='A')p2LeftBtn=true;
  if(e.key==='d'||e.key==='D')p2RightBtn=true;
  if(e.key==='Escape'||e.key==='p'||e.key==='P'){
    if(screen===SCR.GAME)screen=SCR.PAUSE;
    else if(screen===SCR.PAUSE)screen=SCR.GAME;
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')leftBtn=false;
  if(e.key==='ArrowRight')rightBtn=false;
  if(e.key==='a'||e.key==='A')p2LeftBtn=false;
  if(e.key==='d'||e.key==='D')p2RightBtn=false;
});

// ─── Game init / over ─────────────────────────────────────────────────────────
function startGame(){

  score=0;lives=3;level=1;kills=0;lvlKills=0;

  boss=null;bossPresent=false;
  cannonX=gameMode===1?W/4:W/2;shootTimer=0;frame=0;muzzleFlash=0;

  tutorialTimer=180;

  levelFlashTimer=0;levelFlashNum=1;

  upgrades={fireRate:0,bulCount:1,bulSize:0,bulSpeed:0,pierce:0,explosive:false};

  score2=0;cannonX2=3*W/4;recoil2=0;shootTimer2=0;muzzleFlash2=0;

function gameOver(){
  screen=SCR.OVER;

  saveHof(score);
  if(level>=10)unlockAch('survivor');
  // Daily challenge check
  if(!dailyDone){
    const dcGoal=Math.round(_dc*(difficulty===0?.55:difficulty===2?1.6:1));
    if(score>=dcGoal){dailyDone=true;localStorage.setItem(_dcKey,'1');spawnPopup(W/2,H/2-60,'📅 DAILY DONE!','#b27af7');}
  }
  sfxGameOver(); shake(14,600); screenFlash(0.8,'#ff0000');
}
function saveHof(s){
  if(s<=0)return;
  hofScores.push(s);
  hofScores.sort((a,b)=>b-a);
  hofScores=hofScores.slice(0,5);
  localStorage.setItem('squish_hof',JSON.stringify(hofScores));
}
function unlockAch(id){
  if(unlockedAch.has(id))return;
  unlockedAch.add(id);
  localStorage.setItem('squish_ach',JSON.stringify([...unlockedAch]));
  pendingAch.push(id);
}
function showNextAch(){
  if(achBannerTimer>0||pendingAch.length===0)return;
  const id=pendingAch.shift();
  const a=ACH[id];
  if(!a)return;
  achBannerMsg=a.icon+' '+a.label;
  achBannerTimer=3.0;
  beep(880,'sine',0.06,0.2);
  beep(1100,'sine',0.08,0.18);
}

// ─── Background ───────────────────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0d1a'); g.addColorStop(0.5,'#101028'); g.addColorStop(1,'#0a1628');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  for(const n of NEBULAE){
    const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    ng.addColorStop(0,`hsla(${n.hue},70%,50%,${n.a+Math.sin(frame*.008+n.hue)*.012})`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  }

  for(const s of STARS){
    const tw=0.5+0.5*Math.sin(frame*s.twinkleSpeed*.016+s.twinklePhase);
    ctx.globalAlpha=s.a*(0.3+0.7*tw);
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    s.y+=s.vy; s.x+=s.vx;
    if(s.y>H+2){s.y=-2;s.x=Math.random()*W;}
    if(s.x<-2||s.x>W+2)s.x=Math.random()*W;
  }
  ctx.globalAlpha=1;

  ctx.globalAlpha=0.025;
  ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3){ctx.fillRect(0,y,W,1);}
  ctx.globalAlpha=1;
}

// ─── Draw blob ────────────────────────────────────────────────────────────────
function drawBlob(b, isTitle=false){
  const s=b.sz;
  const pulse=1+0.07*Math.sin(b.wobble);
  const rx=s*(b.dying?b.dScale:1);
  const ry=s*(b.dying?1/Math.max(b.dScale,0.1):pulse);
  const col=b.flash>0?'#ffffff':b.col;

  if(!isTitle&&!b.dying){
    b.trail.forEach((pt,i)=>{
      const frac=i/b.trail.length;
      ctx.globalAlpha=frac*0.13;
      ctx.fillStyle=b.col;
      ctx.beginPath();ctx.ellipse(pt.x,pt.y,s*frac*0.58,s*frac*0.4,0,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    const _sha=0.20-Math.max(0,(b.y-H*0.65)/(H*0.35))*0.14;
    const _sg=ctx.createRadialGradient(b.x,b.y+s*0.76,0,b.x,b.y+s*0.76,s*0.95);
    _sg.addColorStop(0,'rgba(0,0,0,'+_sha+')');_sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=_sg;
    ctx.beginPath();ctx.ellipse(b.x,b.y+s*0.76,s*0.9,s*0.26,0,0,Math.PI*2);ctx.fill();
  }

  const isPhantom=b.type==='phantom';
  if(isPhantom){ctx.save();ctx.globalAlpha=0.7+0.18*Math.sin(b.wobble*2.2);}

  // ── Outer ambient glow ──────────────────────────────────────────────────────
  ctx.save();
  ctx.shadowColor=b.glow||b.col;
  ctx.shadowBlur=b.type==='gold'?40:isPhantom?52:30;

  // ── Main body gradient (deep 3D shading) ────────────────────────────────────
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  const bg=ctx.createRadialGradient(b.x-rx*.32,b.y-ry*.32,0,b.x+rx*.1,b.y+ry*.1,rx*1.35);
  bg.addColorStop(0,   lighten(col,60));
  bg.addColorStop(0.28,lighten(col,18));
  bg.addColorStop(0.6, col);
  bg.addColorStop(0.85,darken(col,28));
  bg.addColorStop(1,   darken(col,50));
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=lighten(col,30); ctx.lineWidth=2; ctx.stroke();
  ctx.shadowBlur=0;

  // ── Inner specular sheen (clipped) ──────────────────────────────────────────
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  ctx.clip();
  const sg=ctx.createRadialGradient(b.x-rx*.38,b.y-ry*.42,0,b.x-rx*.12,b.y-ry*.18,rx*.68);
  sg.addColorStop(0,'rgba(255,255,255,.60)');
  sg.addColorStop(0.4,'rgba(255,255,255,.14)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg; ctx.fill();
  ctx.restore();

  // ── Tiny specular dot — Pixar sheen ─────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(b.x-rx*.28,b.y-ry*.3,rx*.11,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fill();
  ctx.restore();

  // ── Subsurface scattering rim ────────────────────────────────────────────────
  ctx.save();
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx*1.04,ry*1.04);
  const _hex=b.col.replace('#','');
  const _rr=parseInt(_hex.slice(0,2),16),_gg=parseInt(_hex.slice(2,4),16),_bb2=parseInt(_hex.slice(4,6),16);
  const _ssG=ctx.createRadialGradient(b.x,b.y,rx*0.62,b.x,b.y,rx*1.08);
  _ssG.addColorStop(0,'rgba(0,0,0,0)');
  _ssG.addColorStop(0.68,'rgba(0,0,0,0)');
  _ssG.addColorStop(1,'rgba('+_rr+','+_gg+','+_bb2+',0.35)');
  ctx.fillStyle=_ssG;ctx.fill();
  ctx.restore();

  // ── Surface bumps around perimeter ──────────────────────────────────────────
  const nB=8;
  for(let i=0;i<nB;i++){
    const a=(Math.PI*2/nB)*i+b.rot*0.6;
    const bx=b.x+Math.cos(a)*rx*.84;
    const by=b.y+Math.sin(a)*ry*.84;
    const br=rx*.13;
    ctx.save();
    ctx.shadowColor=b.glow; ctx.shadowBlur=5;
    const bG=ctx.createRadialGradient(bx-br*.35,by-br*.35,0,bx,by,br);
    bG.addColorStop(0,lighten(col,42));
    bG.addColorStop(1,darken(col,12));
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2);
    ctx.fillStyle=bG; ctx.fill();
    ctx.strokeStyle=lighten(col,25); ctx.lineWidth=0.8; ctx.stroke();
    ctx.restore();
  }

  // ── HP dots ─────────────────────────────────────────────────────────────────
  if(b.maxHp>1&&b.hp>0){
    for(let i=0;i<b.hp;i++){
      ctx.beginPath();ctx.arc(b.x-5+i*10,b.y+ry*.74,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
    }
  }

  drawBlobFace(b.x,b.y,s,rx,ry,b.flash>0.15?"hurt":b.expr,b.wobble,col);
  if(isPhantom)ctx.restore();
}

function drawBlobFace(cx,cy,s,rx,ry,expr,wobble,col){
  const ey=cy-ry*.08;
  const ex1=cx-rx*.3, ex2=cx+rx*.3;
  const ew=rx*.23, eh=ry*.26;

  // ── White sclera ────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(255,255,255,.97)';
  ctx.beginPath();ctx.ellipse(ex1,ey,ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex2,ey,ew,eh,0,0,Math.PI*2);ctx.fill();

  // ── Dark pupil ──────────────────────────────────────────────────────────────
  ctx.fillStyle='#0d0d1a';
  if(expr==='sleepy'){
    ctx.beginPath();ctx.ellipse(ex1,ey+eh*.18,ew*.68,eh*.58,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex2,ey+eh*.18,ew*.68,eh*.58,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=col;
    ctx.fillRect(ex1-ew-1,ey-eh-2,ew*2+2,eh+2);
    ctx.fillRect(ex2-ew-1,ey-eh-2,ew*2+2,eh+2);
  } else {
    ctx.beginPath();ctx.ellipse(ex1+ew*.1,ey+eh*.1,ew*.64,eh*.68,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex2+ew*.1,ey+eh*.1,ew*.64,eh*.68,0,0,Math.PI*2);ctx.fill();
  }

  // ── Eye specular highlights ──────────────────────────────────────────────────
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.beginPath();ctx.arc(ex1-ew*.2,ey-eh*.2,ew*.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex2-ew*.2,ey-eh*.2,ew*.3,0,Math.PI*2);ctx.fill();
  // Tiny secondary dot
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath();ctx.arc(ex1+ew*.22,ey+eh*.18,ew*.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex2+ew*.22,ey+eh*.18,ew*.12,0,Math.PI*2);ctx.fill();

  // ── Angry brows ─────────────────────────────────────────────────────────────
  if(expr==='angry'){
    ctx.strokeStyle='#0d0d1a';ctx.lineWidth=2.8;
    ctx.beginPath();ctx.moveTo(ex1-ew*1.2,ey-eh*2.1);ctx.lineTo(ex1+ew*.5,ey-eh*1.0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex2+ew*1.2,ey-eh*2.1);ctx.lineTo(ex2-ew*.5,ey-eh*1.0);ctx.stroke();
  }

  // ── Hurt X-eyes ─────────────────────────────────────────────────────────────
  if(expr==='hurt'){
    ctx.strokeStyle='#ff3333';ctx.lineWidth=2.6;ctx.lineCap='round';
    const _hw=ew*0.58;
    [[ex1,ey],[ex2,ey]].forEach(([_ex,_ey])=>{
      ctx.beginPath();ctx.moveTo(_ex-_hw,_ey-_hw*0.75);ctx.lineTo(_ex+_hw,_ey+_hw*0.75);ctx.stroke();
      ctx.beginPath();ctx.moveTo(_ex+_hw,_ey-_hw*0.75);ctx.lineTo(_ex-_hw,_ey+_hw*0.75);ctx.stroke();
    });
  }

  // ── Mouth ───────────────────────────────────────────────────────────────────
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=2.5;
  ctx.lineCap='round';
  ctx.beginPath();
  const my=cy+ry*.38;
  if(expr==='hurt'){
    ctx.moveTo(cx-rx*.28,my+3);ctx.quadraticCurveTo(cx-rx*.08,my-4,cx,my+3);
    ctx.quadraticCurveTo(cx+rx*.08,my+8,cx+rx*.28,my+3);
  } else if(expr==='angry'){
    ctx.moveTo(cx-rx*.3,my+4);ctx.quadraticCurveTo(cx,my-6,cx+rx*.3,my+4);
  } else if(expr==='smug'){
    ctx.moveTo(cx-rx*.2,my);ctx.quadraticCurveTo(cx+rx*.18,my+10,cx+rx*.32,my-3);
  } else {
    ctx.moveTo(cx-rx*.32,my);ctx.quadraticCurveTo(cx,my+ry*.24,cx+rx*.32,my);
  }
  ctx.stroke();
}

// ─── Draw Boss ────────────────────────────────────────────────────────────────
function drawBoss(b){
  if(!b)return;
  const s=b.sz;
  const pulse=1+0.07*Math.sin(b.wobble);
  const rx=s*(b.dying?b.dScale:1);
  const ry=s*(b.dying?1/Math.max(b.dScale,0.1):pulse);

  b.trail.forEach((pt,i)=>{
    const frac=i/b.trail.length;
    ctx.globalAlpha=frac*0.15;
    ctx.fillStyle='#C0392B';
    ctx.beginPath();ctx.arc(pt.x,pt.y,s*frac*0.6,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  ctx.save();
  ctx.shadowColor='#ff0000';ctx.shadowBlur=40;
  ctx.beginPath();ctx.arc(b.x,b.y,rx*1.5,0,Math.PI*2);
  const outerG=ctx.createRadialGradient(b.x,b.y,rx*.5,b.x,b.y,rx*1.5);
  outerG.addColorStop(0,'rgba(255,0,0,0.1)');
  outerG.addColorStop(1,'transparent');
  ctx.fillStyle=outerG;ctx.fill();

  ctx.shadowColor='#ff0000';ctx.shadowBlur=15;
  for(let i=0;i<10;i++){
    const a=(Math.PI*2/10)*i+b.wobble*.5;
    const x1=b.x+Math.cos(a)*(rx-4), y1=b.y+Math.sin(a)*(ry-4);
    const x2=b.x+Math.cos(a+.16)*(rx+22), y2=b.y+Math.sin(a+.16)*(ry+22);
    const x3=b.x+Math.cos(a-.16)*(rx+22), y3=b.y+Math.sin(a-.16)*(ry+22);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);
    ctx.closePath();
    const sc=b.flash>0?'#ff4444':'#7B241C';
    ctx.fillStyle=sc;ctx.fill();
  }

  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  const bg=ctx.createRadialGradient(b.x-rx*.3,b.y-ry*.3,0,b.x,b.y,rx*1.1);
  bg.addColorStop(0,'#e74c3c');
  bg.addColorStop(0.5,b.flash>0?'#fff':'#C0392B');
  bg.addColorStop(1,'#7B241C');
  ctx.fillStyle=bg;ctx.fill();
  ctx.shadowBlur=0;

  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  ctx.clip();
  const sg=ctx.createRadialGradient(b.x-rx*.32,b.y-ry*.32,0,b.x-rx*.1,b.y-ry*.1,rx*.5);
  sg.addColorStop(0,'rgba(255,255,255,.28)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.fill();
  ctx.restore();

  const ey=b.y-ry*.1;
  ctx.save();ctx.shadowColor='#FFD93D';ctx.shadowBlur=14;
  ctx.fillStyle='#FFD93D';
  ctx.beginPath();ctx.arc(b.x-rx*.3,ey,rx*.14,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+rx*.3,ey,rx*.14,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
  ctx.fillStyle='#0d0d1a';
  ctx.beginPath();ctx.arc(b.x-rx*.3+2,ey,rx*.06,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+rx*.3+2,ey,rx*.06,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=3.5;
  ctx.beginPath();ctx.moveTo(b.x-rx*.52,ey-ry*.22);ctx.lineTo(b.x-rx*.16,ey-ry*.12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(b.x+rx*.52,ey-ry*.22);ctx.lineTo(b.x+rx*.16,ey-ry*.12);ctx.stroke();
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(b.x-rx*.4,b.y+ry*.3);
  for(let i=0;i<6;i++){
    const mx=b.x-rx*.4+(i+.5)*(rx*.8/6);
    ctx.lineTo(mx,i%2===0?b.y+ry*.45:b.y+ry*.25);
  }
  ctx.lineTo(b.x+rx*.4,b.y+ry*.3);ctx.stroke();
}

    ctx.beginPath();ctx.arc(x,y-10,42,Math.PI,0);ctx.stroke();

// ─── Draw HUD ─────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.save();

  // ── Solid dark HUD bar so blobs never bleed through ──
  const HUD_H = 54;
  const barGrad = ctx.createLinearGradient(0,0,0,HUD_H);
  barGrad.addColorStop(0,'rgba(10,10,22,0.96)');
  barGrad.addColorStop(1,'rgba(10,10,22,0.0)');
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, 0, W, HUD_H+8);
  // Thin separator line
  ctx.strokeStyle='rgba(107,203,119,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,HUD_H-4);ctx.lineTo(W,HUD_H-4);ctx.stroke();

  if(gameMode===1){
    // ── 2P HUD (score left & right, lives center) ──
    ctx.shadowColor='#6BCB77';ctx.shadowBlur=12;
    ctx.fillStyle='#6BCB77';ctx.font=F.xs;ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('P1',12,6);
    ctx.shadowBlur=0;ctx.fillStyle='#ffffff';ctx.font=F.score;
    ctx.fillText(score,12,20);

    ctx.shadowColor='#4FFFBF';ctx.shadowBlur=12;
    ctx.fillStyle='#4FFFBF';ctx.font=F.xs;ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText('P2',W-12,6);
    ctx.shadowBlur=0;ctx.fillStyle='#ffffff';ctx.font=F.score;
    ctx.fillText(score2,W-12,20);

    // Lives center
    ctx.textAlign='center';ctx.fillStyle='rgba(255,107,107,.8)';ctx.font=F.xs;ctx.fillText('LIVES',W/2,6);
    for(let i=2;i>=0;i--){
      ctx.save();
      if(i<lives){ctx.shadowColor='#FF6B6B';ctx.shadowBlur=12;}
      ctx.fillStyle=i<lives?'#FF6B6B':'rgba(255,107,107,.18)';
      ctx.font='20px Arial';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText('♥',W/2-20+i*20,20);
      ctx.restore();
    }
  } else {
    // ── Score (left, x=92 to leave room for EXIT button) ──
    ctx.shadowColor='#6BCB77';ctx.shadowBlur=14;
    ctx.fillStyle='#ffffff';ctx.font=F.score;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(score, 92, 7);
    ctx.shadowBlur=0;

    // ── Best label under score ──
    ctx.fillStyle='rgba(255,215,61,.7)';ctx.font=F.xs;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('BEST '+Math.max(score,hiScore), 92, 36);

    // ── Lives (right) ──
    for(let i=2;i>=0;i--){
      ctx.save();
      if(i<lives){ctx.shadowColor='#FF6B6B';ctx.shadowBlur=12;}
      ctx.fillStyle=i<lives?'#FF6B6B':'rgba(255,107,107,.25)';
      ctx.font='22px Arial';ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillText('♥',W-8-i*26,8);
      ctx.restore();
    }
  }

  // ── Level badge (center of HUD bar) ──
  ctx.save();
  ctx.shadowColor='#6BCB77';ctx.shadowBlur=8;
  rr(W/2-38,5,76,22,11,'rgba(107,203,119,.14)','rgba(107,203,119,.38)',1);
  ctx.fillStyle='#6BCB77';ctx.font=F.xs;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('LVL '+level, W/2, 16);
  ctx.restore();

  // Level progress bar + kills counter (center, below LVL badge)
  const pbx=W/2-38, pby=30, pbw=76, pbh=5;
  rr(pbx,pby,pbw,pbh,3,'rgba(0,0,0,.5)');
  const pct=Math.min(lvlKills/KILLS_PER_LEVEL,1);
  if(pct>0){
    const pg=ctx.createLinearGradient(pbx,0,pbx+pbw,0);
    pg.addColorStop(0,'#4a9a58');pg.addColorStop(1,'#6BCB77');
    rr(pbx,pby,pbw*pct,pbh,3,pg);
  }
  ctx.fillStyle='rgba(107,203,119,.55)';ctx.font=F.xs;
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(lvlKills+'/'+KILLS_PER_LEVEL, W/2, 37);

  // ── Power-up bars (left side, below HUD bar) ──
  let by2=60;
  const bar=(lbl,t,mx,col,glow)=>{
    if(t<=0)return;
    ctx.save();ctx.shadowColor=glow||col;ctx.shadowBlur=6;
    const bwb=110,bhb=7,bxb=6;
    // small pill background
    rr(bxb,by2,bwb,bhb,4,'rgba(0,0,0,.55)');
    const pg2=ctx.createLinearGradient(bxb,0,bxb+bwb,0);
    pg2.addColorStop(0,darken(col,10));pg2.addColorStop(1,col);
    rr(bxb,by2,bwb*(t/mx),bhb,4,pg2);
    ctx.fillStyle='rgba(255,255,255,.75)';ctx.font=F.xs;ctx.textAlign='left';
    ctx.textBaseline='top';
    ctx.fillText(lbl,bxb+2,by2+9);
    ctx.restore();
    by2+=20;
  };
  bar('⚡ RAPID',rfTimer,8,'#FF8C00','rgba(255,140,0,.6)');
  bar('✦ TRIPLE',triTimer,8,'#9B59B6','rgba(155,89,182,.6)');
  bar('🛡 SHIELD',shTimer,10,'#00BCD4','rgba(0,188,212,.6)');
  bar('× ×2 SCORE',mxTimer,10,'#FFD93D','rgba(255,217,61,.6)');
  bar('❄ FREEZE',fzTimer,6,'#00E5FF','rgba(0,229,255,.6)');
  bar('🔴 LASER',lsTimer,5,'#FF00FF','rgba(255,0,255,.6)');

  // ── Boss HP bar (below HUD bar, full width) ──
  if(bossPresent&&boss){
    const bwb=W-40,bhb=14,bxb=20,byb=58;
    ctx.save();
    rr(bxb-4,byb-2,bwb+8,bhb+18,8,'rgba(60,0,0,.8)','rgba(255,60,60,.35)',1);
    ctx.shadowColor='#ff0000';ctx.shadowBlur=12;
    rr(bxb,byb,bwb,bhb,7,'rgba(0,0,0,.7)');
    const pct2=boss.hp/boss.maxHp;
    const hg=ctx.createLinearGradient(bxb,0,bxb+bwb,0);
    hg.addColorStop(0,'#7B241C');hg.addColorStop(pct2*.6,'#C0392B');hg.addColorStop(1,'#FF6B6B');
    if(pct2>0)rr(bxb,byb,bwb*pct2,bhb,7,hg);
    ctx.strokeStyle='rgba(255,100,100,.5)';ctx.lineWidth=1;ctx.strokeRect(bxb,byb,bwb,bhb);
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=F.xs;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚠ BOSS  '+boss.hp+' / '+boss.maxHp,W/2,byb+bhb+8);
    ctx.restore();
  }

  // ── Combo ──
  if(combo>=2){
    const fade=Math.min(1,comboTimer/.6);
    const sz=22+Math.min(combo*3,20);
    const pulse=1+0.08*Math.sin(frame*.18);
    const isRage=combo>=8;
    ctx.save();ctx.globalAlpha=fade;ctx.scale(pulse,pulse);
    const cx2=(W/2)/pulse, cy2=(H/2-30)/pulse;
    ctx.shadowColor=isRage?'#FF4500':'#FF6B6B';ctx.shadowBlur=(isRage?50:20)+combo*2;
    ctx.fillStyle=isRage?'#FF4500':combo>=4?'#FFD93D':'#FF6B6B';
    ctx.font=`900 ${sz}px 'Orbitron',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(isRage?'🔥 RAGE MODE!!!':combo+'× COMBO!',cx2,cy2);
    ctx.restore();
  }
  if(combo>=8&&comboTimer>0){
    const ra=0.10+0.07*Math.abs(Math.sin(frame*.28));
    ctx.save();ctx.globalAlpha=ra;
    ctx.strokeStyle='#FF2200';ctx.lineWidth=20;ctx.strokeRect(0,0,W,H);
    ctx.restore();
  }

  // ── Tutorial drag hint ──
  if(tutorialTimer>0&&screen===SCR.GAME){
    const alpha=Math.min(1,tutorialTimer/30)*Math.min(1,(tutorialTimer)/30);
    ctx.save();ctx.globalAlpha=alpha*0.85;
    rr(W/2-80,RAIL_Y-90,160,30,15,'rgba(132,94,194,.5)','rgba(195,177,225,.5)',1);
    ctx.fillStyle='#e0d0ff';ctx.font=F.sm;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('← DRAG CANNON →',W/2,RAIL_Y-75);
    ctx.restore();
    tutorialTimer--;
  }

  // ── Pause hint ──
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font=F.xs;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText('P = PAUSE',W-10,H-4);

  ctx.restore();
}

// ─── Title screen ─────────────────────────────────────────────────────────────
const TITLE_BLOBS = [
  {x:W*.18,y:240,type:'blue', col:'#4D96FF',glow:'rgba(77,150,255,.6)', sz:26,expr:'sleepy',blobPts:makeBlobPts(8),wobble:0,rot:0,dy:0,phase:1.5,speed:0.8},
  {x:W*.82,y:260,type:'red',  col:'#FF6B6B',glow:'rgba(255,107,107,.6)',sz:20,expr:'angry', blobPts:makeBlobPts(8),wobble:0,rot:0,dy:0,phase:0,speed:1.1},
  {x:W*.12,y:370,type:'gold', col:'#FFD93D',glow:'rgba(255,217,61,.6)', sz:18,expr:'smug',  blobPts:makeBlobPts(8),wobble:0,rot:0,dy:0,phase:3,speed:0.7},
  {x:W*.88,y:350,type:'green',col:'#6BCB77',glow:'rgba(107,203,119,.6)',sz:22,expr:'happy', blobPts:makeBlobPts(8),wobble:0,rot:0,dy:0,phase:2,speed:0.9},
];

function drawTitle(){
  drawBg();

  for(const b of TITLE_BLOBS){
    b.wobble+=.055; b.rot+=.008;
    b.dy=Math.sin(frame*.016*b.speed+b.phase)*18;
    updateBlobPts(b.blobPts);
    const bb={...b,y:b.y+b.dy,dying:false,dScale:1,flash:0,maxHp:1,trail:[]};
    drawBlob(bb, true);
  }

  titleBlobY+=.7*titleBlobD;
  if(titleBlobY>318)titleBlobD=-1; if(titleBlobY<285)titleBlobD=1;
  const hb={x:W/2,y:titleBlobY,type:'green',col:'#6BCB77',glow:'rgba(107,203,119,.7)',
    sz:40,hp:1,maxHp:1,expr:'happy',wobble:frame*.055,rot:frame*.012,
    dying:false,dScale:1,flash:0,blobPts:makeBlobPts(8),trail:[]};
  updateBlobPts(hb.blobPts);
  drawBlob(hb, true);

  // Title — multi-layer HiDPI-smooth rendering
  const tPulse=1+0.025*Math.sin(frame*.05);
  ctx.save();
  ctx.translate(W/2,108);ctx.scale(tPulse,tPulse);
  ctx.font=F.title;ctx.textAlign='center';ctx.textBaseline='middle';
  // Outer halo
  ctx.shadowColor='#6BCB77';ctx.shadowBlur=80;
  ctx.fillStyle='rgba(107,203,119,0.15)';ctx.fillText("SQUISH 'EM!",0,0);
  // Mid glow
  ctx.shadowBlur=38+10*Math.sin(frame*.04);
  ctx.fillStyle='#6BCB77';ctx.fillText("SQUISH 'EM!",0,0);
  // Dark stroke outline for crispness
  ctx.shadowBlur=0;ctx.strokeStyle='rgba(20,60,28,0.75)';ctx.lineWidth=5;
  ctx.strokeText("SQUISH 'EM!",0,0);
  // Gradient fill on top
  const tGrad=ctx.createLinearGradient(-190,-32,190,32);
  tGrad.addColorStop(0,'#c8ffcf');tGrad.addColorStop(0.35,'#6BCB77');
  tGrad.addColorStop(0.65,'#4a9a58');tGrad.addColorStop(1,'#c8ffcf');
  ctx.shadowColor='#6BCB77';ctx.shadowBlur=18;
  ctx.fillStyle=tGrad;ctx.fillText("SQUISH 'EM!",0,0);
  ctx.restore();
  // Subtitle
  ctx.save();
  const subAlpha=0.45+0.15*Math.abs(Math.sin(frame*.025));
  ctx.shadowColor='#FFD93D';ctx.shadowBlur=8;
  ctx.fillStyle=`rgba(255,217,61,${subAlpha})`;ctx.font=F.body;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('— BLOB SHOOTER —',W/2,152);
  ctx.restore();

  // ── Difficulty selector buttons ──
  diffBtnRects=[];
  const dbW=88,dbH=26,dbGap=8;
  const dbTotalW=dbW*3+dbGap*2;
  const dbX0=(W-dbTotalW)/2;
  const dbY=374;
  ctx.save();
  ctx.font=F.xs;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font=F.xs;
  ctx.fillText('DIFFICULTY',W/2,dbY-12);
  for(let i=0;i<3;i++){
    const bx=dbX0+i*(dbW+dbGap);
    diffBtnRects[i]={x:bx,y:dbY,w:dbW,h:dbH};
    const sel=difficulty===i;
    const col=DIFF_COLS[i];
    ctx.save();
    if(sel){ctx.shadowColor=col;ctx.shadowBlur=14;}
    rr(bx,dbY,dbW,dbH,13,
      sel?col+'33':'rgba(255,255,255,.06)',
      sel?col:'rgba(255,255,255,.15)',1.2);
    ctx.fillStyle=sel?col:'rgba(255,255,255,.5)';
    ctx.font=sel?`bold 10px 'Orbitron',sans-serif`:`9px 'Orbitron',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(DIFF_LABELS[i],bx+dbW/2,dbY+dbH/2);
    ctx.restore();
  }
  ctx.restore();

  // Tap to play (blinking)
  titleBlink+=.04;
  if(Math.sin(titleBlink)>0){
    ctx.save();
    ctx.shadowColor='#fff';ctx.shadowBlur=14;
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=F.body;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('TAP ANYWHERE TO START',W/2,415);
    ctx.restore();
  }

  // 2P Local button — hidden for now
  modeBtnRect={};

  // Hall of Fame (top 5) — moved up since 2P button hidden
  if(hofScores.length>0){
    const hfy=450, rowH=20;
    rr(W/2-96,hfy-18,192,hofScores.length*rowH+30,10,'rgba(60,50,0,.45)','rgba(255,217,61,.25)',1);

// ─── Update ───────────────────────────────────────────────────────────────────
function update(d){
  dt=d; frame++;

  sfxFlashAlpha=Math.max(0,sfxFlashAlpha-dt*4);
  muzzleFlash=Math.max(0,muzzleFlash-1);

  if(screen!==SCR.GAME)return;

  if(shakeTime>0){
    shakeTime-=dt*1000;
    const shk=shakeMag*(shakeTime>0?Math.pow(Math.max(0,shakeTime)/600,0.4):0);
    shakePhase+=dt*28;
    shakeX=Math.sin(shakePhase*1.7)*shk+Math.cos(shakePhase*2.9)*shk*0.45;
    shakeY=Math.cos(shakePhase*1.3)*shk+Math.sin(shakePhase*3.1)*shk*0.4;
    if(shakeTime<=0)shakeMag=0;
  } else {shakeX=0;shakeY=0;}

  if(leftBtn) cannonX=Math.max(22,cannonX-6);
  if(rightBtn)cannonX=Math.min(gameMode===1?W/2-22:W-22,cannonX+6);
  if(recoil>0)recoil=Math.max(0,recoil-.65);

  const rate=rfActive?.14:(0.5*Math.pow(0.82,upgrades.fireRate));
  shootTimer+=dt;
  if(shootTimer>=rate){shootTimer=0;fire();}

  // ── P2 cannon ──
  if(gameMode===1){
    if(p2LeftBtn) cannonX2=Math.max(W/2+22,cannonX2-6);
    if(p2RightBtn)cannonX2=Math.min(W-22,cannonX2+6);
    if(recoil2>0)recoil2=Math.max(0,recoil2-.65);
    muzzleFlash2=Math.max(0,muzzleFlash2-1);
    shootTimer2+=dt;
    if(shootTimer2>=rate){shootTimer2=0;fire2();}
  }

  if(rfActive){rfTimer-=dt;if(rfTimer<=0)rfActive=false;}
  if(triActive){triTimer-=dt;if(triTimer<=0)triActive=false;}
  if(shActive){shTimer-=dt;if(shTimer<=0)shActive=false;}
  if(mxActive){mxTimer-=dt;if(mxTimer<=0)mxActive=false;}
  if(fzActive){fzTimer-=dt;if(fzTimer<=0)fzActive=false;}
  if(lsActive){
    lsTimer-=dt;if(lsTimer<=0)lsActive=false;
    for(let i=blobs.length-1;i>=0;i--){
      const b=blobs[i];if(b.dying)continue;
      if(Math.abs(b.x-cannonX)<24){b.dying=true;sfxSquish();spawnParticles(b.x,b.y,b.col,8);spawnRing(b.x,b.y,b.col);addKill(b.pts,b.x,b.y);}
    }
    if(bossPresent&&boss&&!boss.dying&&Math.abs(boss.x-cannonX)<boss.sz+14){
      boss.hp-=dt*9;boss.flash=0.3;
      if(boss.hp<=0){addKill(500,boss.x,boss.y);boss.dying=true;unlockAch('boss_slayer');spawnParticles(boss.x,boss.y,'#C0392B',20);spawnRing(boss.x,boss.y,'#FF6B6B');dropPowerup(boss.x,boss.y);screenFlash(0.5,'#ff6600');}
    }
  }
  if(combo>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1;}}
  if(streakTimer>0){streakTimer-=dt;if(streakTimer<=0)streakCount=0;}
  if(levelFlashTimer>0)levelFlashTimer-=dt;
  if(nukeFlashTimer>0)nukeFlashTimer--;
  if(achBannerTimer>0)achBannerTimer-=dt;
  else showNextAch();

  if(Math.random()<(.028+level*.005)*DIFF_SPAWN[difficulty])spawnBlob();

  for(let i=blobs.length-1;i>=0;i--){
    const b=blobs[i];
    b.wobble+=.065; b.rot+=.012;
    b.flash=Math.max(0,b.flash-dt*6);
    updateBlobPts(b.blobPts);
    b.driftPhase=(b.driftPhase||0)+(b.driftSpeed||0.022);
    const _drift=Math.sin(b.driftPhase)*(b.driftAmp||0.22);
    if(!b.dying&&b.type!=='gold'&&b.type!=='phantom')
      b.x=Math.max(b.sz,Math.min(W-b.sz,b.x+_drift));
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>20)b.trail.shift();

    if(b.dying){
      b.dTimer+=dt; b.dScale=Math.max(0,1-b.dTimer*4.5);
      if(b.dScale<=0)blobs.splice(i,1);
      continue;
    }
    const fzMult=fzActive?0.12:1;
    b.y+=b.spd*fzMult;
    if(b.zz){b.zzPhase+=.045*fzMult;b.x+=Math.sin(b.zzPhase)*2*fzMult;b.x=Math.max(b.sz,Math.min(W-b.sz,b.x));}
    if(b.type==='phantom'){b.zzPhase=(b.zzPhase||0)+0.08*fzMult;b.x+=Math.sin(b.zzPhase)*3*fzMult;b.x=Math.max(b.sz,Math.min(W-b.sz,b.x));}
    if(b.y>H-56){
      blobs.splice(i,1);
      if(shActive){shActive=false;shTimer=0;spawnPopup(W/2,H/2,'BLOCKED!','#00BCD4');}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }

  if(bossPresent&&boss){
    boss.wobble+=.04; boss.rot+=.008;
    boss.flash=Math.max(0,boss.flash-dt*6);
    updateBlobPts(boss.blobPts);
    boss.trail.push({x:boss.x,y:boss.y});
    if(boss.trail.length>16)boss.trail.shift();

    if(boss.dying){
      boss.dTimer+=dt; boss.dScale=Math.max(0,1-boss.dTimer*2.8);
      if(boss.dScale<=0){boss=null;bossPresent=false;}
    } else {
      if(!boss.arrived){boss.y+=2.8*(fzActive?0.2:1);if(boss.y>=boss.targetY)boss.arrived=true;}
      else{
        boss.x+=boss.spd*boss.dir*(fzActive?0.15:1);
        if(boss.x>W-boss.sz||boss.x<boss.sz)boss.dir*=-1;
        boss.spd=Math.min(3,.5+((boss.maxHp-boss.hp)/boss.maxHp)*2.5);
      }
      const bPhase2=boss.hp<boss.maxHp*0.5;
      boss.sTimer-=dt;
      if(boss.sTimer<=0){
        boss.sTimer=bPhase2?1.0+(Math.random()-.5)*.3:2.4+(Math.random()-.5)*.6;
        if(bPhase2){
          for(const va of[-2.8,0,2.8])
            bossShots.push({x:boss.x,y:boss.y+boss.sz,vx:va,vy:4.8,r:9,trail:[]});
          if(Math.random()<.5)screenFlash(0.1,'#FF4500');
        } else {
          bossShots.push({x:boss.x,y:boss.y+boss.sz,vx:(Math.random()-.5)*3.5,vy:4,r:9,trail:[]});
        }
      }
      // phase 2 glow on boss
      if(bPhase2&&!boss.dying){boss.glow='rgba(255,80,0,.9)';}
      if(boss.y>H-80){
        bossPresent=false;boss=null;
        if(shActive){shActive=false;shTimer=0;}
        else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
      }
    }
  }

  for(let i=bossShots.length-1;i>=0;i--){
    const p=bossShots[i];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>8)p.trail.shift();
    p.x+=p.vx; p.y+=p.vy;
    if(p.y>H+10||p.x<-20||p.x>W+20){bossShots.splice(i,1);continue;}
    const dx=p.x-cannonX,dy=p.y-(RAIL_Y-10);
    let hitShot=false;
    if(Math.sqrt(dx*dx+dy*dy)<p.r+22){hitShot=true;}
    if(!hitShot&&gameMode===1){const dx2=p.x-cannonX2,dy2=p.y-(RAIL_Y-10);if(Math.sqrt(dx2*dx2+dy2*dy2)<p.r+22)hitShot=true;}
    if(hitShot){
      bossShots.splice(i,1);
      if(shActive){shActive=false;shTimer=0;spawnPopup(W/2,H/2,'BLOCKED!','#00BCD4');}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>7)b.trail.shift();
    b.x+=b.vx; b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20){bullets.splice(i,1);continue;}
    let hit=false;
    if(bossPresent&&boss&&!boss.dying){
      const dx=b.x-boss.x,dy=b.y-boss.y;
      if(Math.sqrt(dx*dx+dy*dy)<boss.sz+b.r){
        bullets.splice(i,1);boss.hp--;boss.flash=.25;
        spawnSparks(b.x,b.y,'#FF6B6B',4);
        if(boss.hp<=0){
          addKill(500,boss.x,boss.y);boss.dying=true;
          unlockAch('boss_slayer');
          spawnParticles(boss.x,boss.y,'#C0392B',20);
          spawnRing(boss.x,boss.y,'#FF6B6B');
          spawnSparks(boss.x,boss.y,'#FFD93D',14);
          dropPowerup(boss.x,boss.y);
          screenFlash(0.5,'#ff6600');
        }
        hit=true;
      }
    }
    if(hit)continue;
    for(let j=blobs.length-1;j>=0;j--){
      const bl=blobs[j];
      if(bl.dying)continue;
      const dx=b.x-bl.x,dy=b.y-bl.y;
      if(Math.sqrt(dx*dx+dy*dy)<bl.sz+b.r){
        bl.hp--;bl.flash=.32;
        spawnSparks(b.x,b.y,bl.col,3);
        // Pierce: don't remove bullet until pierced quota used
        if(b.pierce>0&&b.pierced<b.pierce){b.pierced++;}
        else{bullets.splice(i,1);}
        // Explosive radius
        if(b.expl){
          for(let k=blobs.length-1;k>=0;k--){
            if(blobs[k]===bl||blobs[k].dying)continue;
            const ex=blobs[k].x-b.x,ey2=blobs[k].y-b.y;
            if(Math.sqrt(ex*ex+ey2*ey2)<48){blobs[k].hp--;blobs[k].flash=0.4;spawnSparks(blobs[k].x,blobs[k].y,bl.col,4);if(blobs[k].hp<=0){blobs[k].dying=true;sfxSquish();spawnParticles(blobs[k].x,blobs[k].y,blobs[k].col,8);spawnRing(blobs[k].x,blobs[k].y,blobs[k].col);dropPowerup(blobs[k].x,blobs[k].y);addKill(blobs[k].pts,blobs[k].x,blobs[k].y);}}
          }
          spawnRing(b.x,b.y,'#f97316');screenFlash(0.12,'#f97316');
        }
        if(bl.hp<=0){
          bl.dying=true; sfxSquish();
          spawnParticles(bl.x,bl.y,bl.col,10+Math.floor(Math.random()*5));
          spawnRing(bl.x,bl.y,bl.col);
          dropPowerup(bl.x,bl.y);
          addKill(bl.pts,bl.x,bl.y);
          // Splash damage — deal 1 HP to blobs within 40px
          for(let k=blobs.length-1;k>=0;k--){
            if(blobs[k]===bl||blobs[k].dying)continue;
            const sdx=blobs[k].x-bl.x,sdy=blobs[k].y-bl.y;
            if(Math.sqrt(sdx*sdx+sdy*sdy)<42){
              blobs[k].hp--;blobs[k].flash=0.4;
              spawnSparks(blobs[k].x,blobs[k].y,bl.col,3);
              if(blobs[k].hp<=0){
                blobs[k].dying=true;sfxSquish();
                spawnParticles(blobs[k].x,blobs[k].y,blobs[k].col,8);
                spawnRing(blobs[k].x,blobs[k].y,blobs[k].col);
                dropPowerup(blobs[k].x,blobs[k].y);
                addKill(blobs[k].pts,blobs[k].x,blobs[k].y);
              }
            }
          }
        }
        // Only stop checking blobs if bullet was consumed (not piercing)
        const bulletStillAlive=bullets[i]&&bullets[i].pierced>0&&bullets[i].pierce>0;
        if(!bulletStillAlive){hit=true;break;}
      }
    }
  }

  // ── P2 bullets ──
  if(gameMode===1){
    for(let i=bullets2.length-1;i>=0;i--){
      const b=bullets2[i];
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>7)b.trail.shift();
      b.x+=b.vx; b.y+=b.vy;
      if(b.y<-20||b.x<-20||b.x>W+20){bullets2.splice(i,1);continue;}
      let hit2=false;
      if(bossPresent&&boss&&!boss.dying){
        const dx=b.x-boss.x,dy=b.y-boss.y;
        if(Math.sqrt(dx*dx+dy*dy)<boss.sz+b.r){
          bullets2.splice(i,1);boss.hp--;boss.flash=.25;
          spawnSparks(b.x,b.y,'#4FFFBF',4);
          if(boss.hp<=0){
            addKill(500,boss.x,boss.y,2);boss.dying=true;
            unlockAch('boss_slayer');
            spawnParticles(boss.x,boss.y,'#C0392B',20);
            spawnRing(boss.x,boss.y,'#4FFFBF');
            spawnSparks(boss.x,boss.y,'#FFD93D',14);
            dropPowerup(boss.x,boss.y);
            screenFlash(0.5,'#ff6600');
          }
          hit2=true;
        }
      }
      if(hit2)continue;
      for(let j=blobs.length-1;j>=0;j--){
        const bl=blobs[j];
        if(bl.dying)continue;
        const dx=b.x-bl.x,dy=b.y-bl.y;
        if(Math.sqrt(dx*dx+dy*dy)<bl.sz+b.r){
          bullets2.splice(i,1);bl.hp--;bl.flash=.32;
          spawnSparks(b.x,b.y,'#4FFFBF',3);
          if(bl.hp<=0){
            bl.dying=true; sfxSquish();
            spawnParticles(bl.x,bl.y,bl.col,10);
            spawnRing(bl.x,bl.y,bl.col);
            dropPowerup(bl.x,bl.y);
            addKill(bl.pts,bl.x,bl.y,2);
          }
          hit2=true;break;
        }
      }
    }
  }

  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.y+=p.vy; p.life-=p.decay; p.rot+=0.04;
    if(p.y>H||p.life<=0){powerups.splice(i,1);continue;}
    // Magnetic attraction toward cannon when close
    const mdx=cannonX-p.x, mdy=(RAIL_Y-10)-p.y;
    const mDist=Math.sqrt(mdx*mdx+mdy*mdy);
    let useP2=false;
    if(gameMode===1){const mdx2=cannonX2-p.x,mdy2=(RAIL_Y-10)-p.y;const mDist2=Math.sqrt(mdx2*mdx2+mdy2*mdy2);if(mDist2<mDist&&mDist2<100){useP2=true;const m2=2.2*(1-mDist2/100);p.x+=mdx2/mDist2*m2;p.y+=mdy2/mDist2*m2;}}
    if(!useP2&&mDist<100&&mDist>0){const m=2.2*(1-mDist/100);p.x+=mdx/mDist*m;p.y+=mdy/mDist*m;}
    const cx=useP2?cannonX2:cannonX;
    const dx=p.x-cx,dy=p.y-(RAIL_Y-10);
    if(Math.sqrt(dx*dx+dy*dy)<p.r+28){
      applyPowerup(p.type);
      spawnPopup(p.x,p.y,p.type.toUpperCase(),'#00BCD4');
      powerups.splice(i,1);
    }
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.type==='ring'){
      p.r+=(p.maxR-p.r)*0.12;
      p.life-=p.decay;
    } else {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.07; p.life-=p.decay;
    }
    if(p.life<=0)particles.splice(i,1);
  }

  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i]; p.y+=p.vy; p.vy*=0.96; p.life-=.018;
    p.scale=Math.max(1,p.scale-0.035);
    if(p.life<=0)popups.splice(i,1);
  }
}

// ─── Draw Game ────────────────────────────────────────────────────────────────
function drawGame(){
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBg();

  // Bottom warning
  const dangerBlob=blobs.some(b=>!b.dying&&b.y>H-180);
  if(dangerBlob){
    const wa=0.1+0.09*Math.abs(Math.sin(frame*.25));
    ctx.save();ctx.globalAlpha=wa;
    const wg2=ctx.createLinearGradient(0,H-100,0,H);
    wg2.addColorStop(0,'transparent');wg2.addColorStop(1,'#FF2200');
    ctx.fillStyle=wg2;ctx.fillRect(0,H-100,W,100);
    ctx.restore();
  }
  for(const b of blobs)drawBlob(b);
  if(bossPresent&&boss)drawBoss(boss);

  // ── Freeze overlay: frost tint on all blobs when FREEZE is active ──
  if(fzActive){
    const fzAlpha=0.28+0.08*Math.sin(frame*.12);
    for(const b of blobs){
      if(b.dying)continue;
      ctx.save();ctx.globalAlpha=fzAlpha;
      ctx.fillStyle='#00E5FF';
      ctx.beginPath();ctx.arc(b.x,b.y,b.sz,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    if(bossPresent&&boss&&!boss.dying){
      ctx.save();ctx.globalAlpha=0.22;ctx.fillStyle='#00E5FF';
      ctx.beginPath();ctx.arc(boss.x,boss.y,boss.sz,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    // Floating snowflake particles
    if(frame%8===0){
      particles.push({x:Math.random()*W,y:Math.random()*H*.6,vx:(Math.random()-.5)*.5,vy:-.4,
        r:3+Math.random()*3,life:1,decay:.018,col:'#00E5FF',type:'circle'});
    }
  }

  for(const b of bullets){
    // Coin trail — golden sparkles
    b.trail.forEach((pt,i)=>{
      const frac=i/b.trail.length;
      ctx.globalAlpha=frac*0.4;
      ctx.fillStyle=triActive?'#c9a8ff':'#FFD93D';
      ctx.beginPath();ctx.arc(pt.x,pt.y,b.r*frac*0.7,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    // Spinning coin — use frame to rotate
    const coinSpin=b.coinAngle||0;
    b.coinAngle=(coinSpin+0.22)%(Math.PI*2);
    const coinW=Math.abs(Math.cos(coinSpin))*b.r+1; // width oscillates for spin effect
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.shadowColor=triActive?'#b27af7':'#FFD93D';ctx.shadowBlur=20;
    // Outer rim
    ctx.beginPath();ctx.ellipse(0,0,b.r+1,b.r+1,0,0,Math.PI*2);
    ctx.fillStyle=triActive?'#9B59B6':'#c8a800';ctx.fill();
    // Coin face — ellipse that narrows as it spins
    ctx.beginPath();ctx.ellipse(0,0,Math.max(1,coinW),b.r,0,0,Math.PI*2);
    const cg=ctx.createLinearGradient(-coinW,-b.r,coinW,b.r);
    if(triActive){cg.addColorStop(0,'#e0c8ff');cg.addColorStop(0.4,'#b27af7');cg.addColorStop(1,'#7a3fb0');}
    else{cg.addColorStop(0,'#fff7a0');cg.addColorStop(0.35,'#FFD93D');cg.addColorStop(0.7,'#e6a800');cg.addColorStop(1,'#b07800');}
    ctx.fillStyle=cg;ctx.fill();
    // Face on coin when visible
    if(coinW>b.r*0.55){
      ctx.shadowBlur=0;
      // eyes
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.beginPath();ctx.arc(-b.r*.28,0,b.r*.18,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc( b.r*.28,0,b.r*.18,0,Math.PI*2);ctx.fill();
      // smile
      ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(0,b.r*.1,b.r*.3,0.25,Math.PI-.25);ctx.stroke();
    }
    // Shine
    ctx.globalAlpha=0.4;
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath();ctx.ellipse(-b.r*.18,-b.r*.3,b.r*.25,b.r*.14,-0.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // ── P2 bullets (cyan) ──
  if(gameMode===1){
    for(const b of bullets2){
      b.trail.forEach((pt,i)=>{
        const frac=(i/b.trail.length);
        ctx.globalAlpha=frac*0.35;
        ctx.fillStyle='#4FFFBF';
        ctx.beginPath();ctx.arc(pt.x,pt.y,b.r*frac,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      ctx.save();ctx.shadowColor='#4FFFBF';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      const bg2=ctx.createRadialGradient(b.x-1,b.y-1,0,b.x,b.y,b.r);
      bg2.addColorStop(0,'#fff');bg2.addColorStop(0.5,'#c8ffef');bg2.addColorStop(1,'#00BCD4');
      ctx.fillStyle=bg2;ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
  }

  // Laser beam
  if(lsActive){
    const lbW=44;
    ctx.save();
    ctx.globalCompositeOperation='screen';
    // Outer beam glow
    const laserGrad=ctx.createLinearGradient(cannonX,0,cannonX,RAIL_Y-52);
    laserGrad.addColorStop(0,'rgba(255,0,255,0.0)');
    laserGrad.addColorStop(0.5,'rgba(255,0,255,0.3)');
    laserGrad.addColorStop(1,'rgba(255,220,255,0.5)');
    ctx.globalAlpha=0.75+0.25*Math.sin(frame*.35);
    ctx.fillStyle=laserGrad;
    ctx.fillRect(cannonX-lbW/2,0,lbW,RAIL_Y-52);
    // Core line
    ctx.globalAlpha=0.95;
    ctx.strokeStyle='rgba(255,255,255,0.95)';ctx.lineWidth=3;
    ctx.shadowColor='#FF00FF';ctx.shadowBlur=30;
    ctx.beginPath();ctx.moveTo(cannonX,RAIL_Y-52);ctx.lineTo(cannonX,0);ctx.stroke();
    ctx.globalCompositeOperation='source-over';
    ctx.restore();
    // Label
    ctx.save();ctx.globalAlpha=0.9;
    ctx.fillStyle='#FF88FF';ctx.font=F.sm;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.shadowColor='#FF00FF';ctx.shadowBlur=10;
    ctx.fillText('LASER '+lsTimer.toFixed(1)+'s',cannonX,RAIL_Y-95);
    ctx.restore();
  }

  for(const p of bossShots){
    p.trail.forEach((pt,i)=>{
      const frac=i/p.trail.length;
      ctx.globalAlpha=frac*0.3;
      ctx.fillStyle='#FF6B6B';
      ctx.beginPath();ctx.arc(pt.x,pt.y,p.r*frac,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.save();ctx.shadowColor='#FF6B6B';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    const bg=ctx.createRadialGradient(p.x-2,p.y-2,0,p.x,p.y,p.r);
    bg.addColorStop(0,'#FF9999');bg.addColorStop(1,'#C0392B');
    ctx.fillStyle=bg;ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }

  for(const p of powerups){
    if(p.spawnFlash>0)p.spawnFlash=Math.max(0,p.spawnFlash-.07);
    p.rot+=0.035;
    const scale=1+p.spawnFlash*0.5+Math.sin(Date.now()*.003+p.x)*.06;
    ctx.save();ctx.globalAlpha=Math.min(1,p.life*2.5);
    ctx.shadowColor=p.glow||p.col;ctx.shadowBlur=24+p.spawnFlash*30;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.scale(scale,scale);
    // Outer ring pulse
    ctx.beginPath();ctx.arc(0,0,p.r+4,0,Math.PI*2);
    ctx.strokeStyle=p.col;ctx.lineWidth=1.5;ctx.globalAlpha*=0.4;ctx.stroke();
    ctx.globalAlpha=Math.min(1,p.life*2.5);
    ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);
    const pg=ctx.createRadialGradient(-p.r*.2,-p.r*.2,0,0,0,p.r);
    pg.addColorStop(0,'#fff');pg.addColorStop(0.4,lighten(p.col,20));pg.addColorStop(1,p.col);
    ctx.fillStyle=pg;ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='bold '+(p.r>18?'14':'12')+'px Arial';ctx.fillStyle='#fff';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.icon,0,0);
    ctx.restore();
  }

  for(const p of particles){
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='ring'){
      ctx.strokeStyle=p.col;ctx.lineWidth=2.5*(p.life);
      ctx.shadowColor=p.col;ctx.shadowBlur=8*p.life;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    } else if(p.type==='spark'){
      ctx.strokeStyle=p.col;ctx.lineWidth=2*p.life;
      ctx.shadowColor=p.col;ctx.shadowBlur=4;
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-p.vx*4,p.y-p.vy*4);ctx.stroke();
    } else {
      ctx.shadowColor=p.col;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.fill();
    }
    ctx.restore();
  }

  for(const p of popups){
    const fadeAlpha=Math.min(1,p.life*3)*Math.min(1,p.life/0.15);
    ctx.save();ctx.globalAlpha=fadeAlpha;
    ctx.shadowColor=p.col;ctx.shadowBlur=14;
    const popScale=p.scale*(0.85+0.15*Math.min(1,(1-p.life)/0.15+1));
    ctx.save();ctx.translate(p.x,p.y);ctx.scale(popScale,popScale);
    ctx.fillStyle=p.col;ctx.font=F.body;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.txt,0,0);
    ctx.restore();ctx.restore();
  }

  // P2 divider line in 2P mode
  if(gameMode===1){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,RAIL_Y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  drawRail();drawCannon();if(gameMode===1)drawCannon2();drawHUD();

  // ── Level-up flash overlay ──
  if(levelFlashTimer>0){
    const t2=levelFlashTimer/1.8;
    const fadeIn=t2>0.85?1:(t2-0.6)/0.25;
    const fadeOut=t2<0.25?t2/0.25:1;
    const alpha=Math.min(fadeIn,fadeOut)*0.88;
    if(alpha>0){
      ctx.save();
      ctx.globalAlpha=alpha;
      const lg=ctx.createLinearGradient(0,H*.3,0,H*.7);
      lg.addColorStop(0,'rgba(10,26,14,0.0)');
      lg.addColorStop(0.4,'rgba(10,44,16,0.92)');
      lg.addColorStop(0.6,'rgba(10,44,16,0.92)');
      lg.addColorStop(1,'rgba(10,26,14,0.0)');
      ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
      ctx.shadowColor='#6BCB77';ctx.shadowBlur=60*(0.5+0.5*Math.sin(frame*.25));
      ctx.fillStyle='#6BCB77';ctx.font=F.h1;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('LEVEL '+levelFlashNum,W/2,H/2-18);
      ctx.shadowBlur=10;ctx.fillStyle='rgba(107,203,119,.7)';ctx.font=F.body;
      ctx.fillText('KEEP GOING!',W/2,H/2+22);
      ctx.restore();
    }
  }

  // ── Nuke lightning strike ──
  if(nukeFlashTimer>0){
    const a=(nukeFlashTimer/50)*0.9;
    ctx.save();
    ctx.globalCompositeOperation='screen';
    ctx.lineWidth=2;
    ctx.shadowBlur=18;
    for(const l of nukeLines){
      ctx.strokeStyle=`rgba(255,120,0,${a})`;
      ctx.shadowColor='#FF4500';
      ctx.beginPath();
      ctx.moveTo(l.x1,l.y1);
      ctx.quadraticCurveTo(l.mx+(Math.random()-0.5)*20,l.my,l.x2,l.y2);
      ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
    ctx.restore();
  }

  // ── Frenzy pulse at x4 combo ──
  if(combo>=4&&comboTimer>0){
    const p=Math.abs(Math.sin(frame*.16))*.09;
    ctx.save();
    ctx.globalAlpha=p;
    ctx.fillStyle='#FF2200';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  ctx.restore();

  if(sfxFlashAlpha>0){
    ctx.globalAlpha=sfxFlashAlpha;
    ctx.fillStyle=sfxFlashColor;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // ── Achievement banner (slides in from top-right) ──
  if(achBannerTimer>0&&achBannerMsg){
    const t3=achBannerTimer/3.0;
    const slideIn=t3>0.92?1-((t3-0.92)/0.08):1;
    const fadeOut=t3<0.18?t3/0.18:1;
    const alpha=Math.min(slideIn,fadeOut);
    const bx=W-200+Math.max(0,(1-slideIn)*200);
    ctx.save();ctx.globalAlpha=alpha;
    rr(bx,8,190,38,12,'rgba(20,10,40,.92)','rgba(255,215,61,.5)',1.5);
    ctx.shadowColor='#FFD93D';ctx.shadowBlur=12;
    ctx.fillStyle='#FFD93D';ctx.font=F.sm;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(achBannerMsg,bx+95,27);
    ctx.restore();
  }
}

// ─── Upgrade Screen Functions ─────────────────────────────────────────────────
function showUpgradeScreen(){
  const pool=UPGRADE_POOL.filter(u=>{
    if(u.id==='bulCount2') return upgrades.bulCount<2;
    if(u.id==='bulCount3') return upgrades.bulCount<3;
    if(u.id==='fireRate')  return upgrades.fireRate<u.max;
    if(u.id==='bulSize')   return upgrades.bulSize<u.max;
    if(u.id==='bulSpeed')  return upgrades.bulSpeed<u.max;
    if(u.id==='pierce')    return upgrades.pierce<u.max;
    if(u.id==='explosive') return !upgrades.explosive;
    return true;
  });
  if(!pool.length){return;} // all maxed — skip screen
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  upgradeCards=pool.slice(0,Math.min(3,pool.length));
  upgradeAnimTimer=0;
  screen=SCR.UPGRADE;
}

function applyUpgrade(u){
  if(!u)return;
  if(u.id==='fireRate')  upgrades.fireRate=Math.min(5,upgrades.fireRate+1);
  if(u.id==='bulCount2') upgrades.bulCount=Math.max(2,upgrades.bulCount);
  if(u.id==='bulCount3') upgrades.bulCount=3;
  if(u.id==='bulSize')   upgrades.bulSize=Math.min(3,upgrades.bulSize+1);
  if(u.id==='bulSpeed')  upgrades.bulSpeed=Math.min(3,upgrades.bulSpeed+1);
  if(u.id==='pierce')    upgrades.pierce=Math.min(2,upgrades.pierce+1);
  if(u.id==='explosive') upgrades.explosive=true;
  upgradeCards=[];upgCardRects=[];
  screen=SCR.GAME;
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.12,0.16),i*55));
  screenFlash(0.4,'#a855f7');
}

function drawUpgradeScreen(){
  upgradeAnimTimer=Math.min(1,upgradeAnimTimer+dt*2.8);
  const easeOut=t=>1-Math.pow(1-t,3);
  const prog=easeOut(upgradeAnimTimer);

  // Dark overlay + vignette
  ctx.fillStyle='rgba(5,3,18,'+0.93*prog+')';
  ctx.fillRect(0,0,W,H);
  const _vg=ctx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.82);
  _vg.addColorStop(0,'rgba(0,0,0,0)');_vg.addColorStop(1,'rgba(0,0,0,0.52)');
  ctx.fillStyle=_vg;ctx.fillRect(0,0,W,H);

  // Title
  ctx.save();ctx.globalAlpha=prog;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#a855f7';ctx.shadowBlur=38;
  ctx.fillStyle='#ffffff';ctx.font="900 33px 'Orbitron',sans-serif";
  ctx.fillText('LEVEL  UP!',W/2,54);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(168,85,247,.55)';ctx.font="bold 10px 'Orbitron',sans-serif";
  ctx.fillText('CHOOSE AN UPGRADE',W/2,80);
  ctx.restore();

  // Current build pills
  const _pills=[];
  if(upgrades.fireRate>0) _pills.push({t:'\u26A1\xD7'+upgrades.fireRate,c:'#f59e0b'});
  if(upgrades.bulCount===2) _pills.push({t:'\u274B\u274B',c:'#8b5cf6'});
  if(upgrades.bulCount===3) _pills.push({t:'\u274B\u274B\u274B',c:'#a855f7'});
  if(upgrades.bulSize>0)  _pills.push({t:'\u25CE\xD7'+upgrades.bulSize,c:'#ef4444'});
  if(upgrades.bulSpeed>0) _pills.push({t:'\u2191\xD7'+upgrades.bulSpeed,c:'#3b82f6'});
  if(upgrades.pierce>0)   _pills.push({t:'\u27A4\xD7'+upgrades.pierce,c:'#06b6d4'});
  if(upgrades.explosive)  _pills.push({t:'\uD83D\uDCA5',c:'#f97316'});
  if(_pills.length){
    const _pw=44,_ph=19,_pg=5;
    const _tw=_pills.length*(_pw+_pg)-_pg;
    let _px=(W-_tw)/2;
    ctx.save();ctx.globalAlpha=prog*0.9;
    _pills.forEach(_p=>{
      rr(_px,95,_pw,_ph,9,_p.c+'1a',_p.c+'66',1);
      ctx.fillStyle=_p.c;ctx.font="9px 'Segoe UI Emoji',sans-serif";
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(_p.t,_px+_pw/2,104);
      _px+=_pw+_pg;
    });
    ctx.restore();
  }

  // Cards
  const _cw=346,_ch=120,_cx0=(W-_cw)/2;
  const _totalH=upgradeCards.length*_ch+(upgradeCards.length-1)*10;
  const _cy0=Math.round((H-_totalH)/2)+14;
  upgCardRects=[];

  upgradeCards.forEach((_u,_i)=>{
    const _delay=_i*0.1;
    const _cp=easeOut(Math.max(0,Math.min(1,(upgradeAnimTimer-_delay)*2.5)));
    const _sy=(1-_cp)*55;
    const _cx=_cx0, _cy=_cy0+_i*(_ch+10);
    upgCardRects.push({x:_cx,y:_cy,w:_cw,h:_ch});

    ctx.save();ctx.globalAlpha=_cp;ctx.translate(0,_sy);

    // Drop shadow
    ctx.shadowColor='rgba(0,0,0,.65)';ctx.shadowBlur=18;ctx.shadowOffsetY=7;
    rr(_cx+2,_cy+4,_cw-4,_ch,16,'rgba(0,0,0,.3)',null);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;

    // Maxed state check
    let _lvl=0;
    if(_u.id==='fireRate') _lvl=upgrades.fireRate;
    else if(_u.id==='bulSize') _lvl=upgrades.bulSize;
    else if(_u.id==='bulSpeed') _lvl=upgrades.bulSpeed;
    else if(_u.id==='pierce') _lvl=upgrades.pierce;
    const _have=(_u.id==='bulCount2'&&upgrades.bulCount>=2)||(_u.id==='bulCount3'&&upgrades.bulCount>=3)||(_u.id==='explosive'&&upgrades.explosive);
    const _maxed=(_u.max>1&&_lvl>=_u.max)||_have;

    // Card bg
    const _cbg=ctx.createLinearGradient(_cx,_cy,_cx+_cw,_cy+_ch);
    _cbg.addColorStop(0,'rgba(26,14,52,.98)');_cbg.addColorStop(1,'rgba(14,7,30,.99)');
    ctx.shadowColor=_maxed?'rgba(0,0,0,.1)':_u.glow;ctx.shadowBlur=_maxed?0:20;
    rr(_cx,_cy,_cw,_ch,16,_cbg,_maxed?'rgba(255,255,255,.08)':_u.col+'99',2);
    ctx.shadowBlur=0;

    // Top accent bar (only if not maxed)
    if(!_maxed){
      ctx.save();
      ctx.beginPath();ctx.roundRect(_cx,_cy,_cw,4,[16,16,0,0]);
      const _ab=ctx.createLinearGradient(_cx,0,_cx+_cw,0);
      _ab.addColorStop(0,'transparent');_ab.addColorStop(0.35,_u.col+'cc');
      _ab.addColorStop(0.65,_u.col);_ab.addColorStop(1,'transparent');
      ctx.fillStyle=_ab;ctx.fill();
      ctx.restore();
    }

    // Icon circle
    const _icX=_cx+52,_icY=_cy+_ch/2;
    ctx.shadowColor=_maxed?'transparent':_u.glow;ctx.shadowBlur=_maxed?0:16;
    ctx.beginPath();ctx.arc(_icX,_icY,28,0,Math.PI*2);
    const _hex2=_u.col.replace('#','');
    const _ir=parseInt(_hex2.slice(0,2),16),_ig2=parseInt(_hex2.slice(2,4),16),_ib=parseInt(_hex2.slice(4,6),16);
    const _ig=ctx.createRadialGradient(_icX-5,_icY-7,0,_icX,_icY,28);
    _ig.addColorStop(0,'rgba('+_ir+','+_ig2+','+_ib+','+(_maxed?.06:.46)+')');
    _ig.addColorStop(1,'rgba('+_ir+','+_ig2+','+_ib+',.08)');
    ctx.fillStyle=_ig;ctx.fill();
    ctx.strokeStyle=_maxed?'rgba(255,255,255,.12)':_u.col+(_maxed?'44':'77');
    ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
    ctx.font="22px 'Segoe UI Emoji',sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=_cp*(_maxed?.35:1);
    ctx.fillText(_u.icon,_icX,_icY+1);
    ctx.globalAlpha=_cp;

    // Title
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.shadowColor=_maxed?'transparent':_u.glow;ctx.shadowBlur=_maxed?0:8;
    ctx.font="bold 13px 'Orbitron',sans-serif";
    ctx.fillStyle=_maxed?'rgba(255,255,255,.28)':_u.col;
    ctx.fillText(_u.title,_cx+90,_cy+20);ctx.shadowBlur=0;

    // Desc
    ctx.font="10px 'Orbitron',sans-serif";
    ctx.fillStyle=_maxed?'rgba(200,200,255,.25)':'rgba(210,200,255,.72)';
    ctx.fillText(_u.desc,_cx+90,_cy+40);

    // Progress bar (stackable)
    if(_u.max>1){
      const _bx=_cx+90,_by=_cy+64,_bw=168,_bh=7;
      rr(_bx,_by,_bw,_bh,4,'rgba(255,255,255,.07)',null);
      if(_lvl>0){
        const _fw=Math.round(_bw*(_lvl/_u.max));
        const _bf=ctx.createLinearGradient(_bx,0,_bx+_bw,0);
        _bf.addColorStop(0,_u.col+'88');_bf.addColorStop(1,_u.col);
        rr(_bx,_by,_fw,_bh,4,_bf,null);
        if(!_maxed){
          ctx.shadowColor=_u.glow;ctx.shadowBlur=9;
          ctx.beginPath();ctx.arc(_bx+_fw,_by+_bh/2,4.5,0,Math.PI*2);
          ctx.fillStyle=_u.col;ctx.fill();ctx.shadowBlur=0;
        }
      }
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.font="8px 'Orbitron',sans-serif";
      ctx.fillStyle=_maxed?'rgba(255,255,255,.55)':'rgba(200,180,255,.5)';
      ctx.fillText(_maxed?'\u2713 MAX':'LVL '+_lvl+' / '+_u.max, _bx+_bw+8, _by+_bh/2);
    } else if(_maxed){
      rr(_cx+90,_cy+62,64,18,9,'rgba(255,255,255,.05)','rgba(255,255,255,.12)',1);
      ctx.fillStyle='rgba(255,255,255,.32)';ctx.font="7px 'Orbitron',sans-serif";
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('\u2713 EQUIPPED',_cx+90+32,_cy+71);
    }

    // Chevron arrow (not maxed)
    if(!_maxed){
      ctx.save();
      ctx.shadowColor=_u.glow;ctx.shadowBlur=14;
      ctx.strokeStyle=_u.col+'cc';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
      const _ax=_cx+_cw-18,_ay=_cy+_ch/2;
      ctx.beginPath();ctx.moveTo(_ax-7,_ay-7);ctx.lineTo(_ax,_ay);ctx.lineTo(_ax-7,_ay+7);ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  });

  // Footer
  ctx.save();ctx.globalAlpha=prog*0.38;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.font="9px 'Orbitron',sans-serif";
  ctx.fillText('TAP A CARD TO UPGRADE',W/2,_cy0+_totalH+28);
  ctx.restore();
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function rr(x,y,w,h,r,fill,stroke,sw=2){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function lighten(hex,pct){
  try{
    const n=parseInt(hex.replace('#',''),16);
    const r=Math.min(255,((n>>16)&0xff)+pct*2.5|0);
    const g=Math.min(255,((n>>8)&0xff)+pct*2.5|0);
    const b=Math.min(255,(n&0xff)+pct*2.5|0);
    return `rgb(${r},${g},${b})`;
  }catch{return hex;}
}
function darken(hex,pct){
  try{
    const n=parseInt(hex.replace('#',''),16);
    const r=Math.max(0,((n>>16)&0xff)-pct*2|0);
    const g=Math.max(0,((n>>8)&0xff)-pct*2|0);
    const b=Math.max(0,(n&0xff)-pct*2|0);
    return `rgb(${r},${g},${b})`;
  }catch{return hex;}
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastT=0;
function loop(now){
  const d=Math.min((now-lastT)/1000,.05);lastT=now;
  update(d);
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(screen===SCR.TITLE)drawTitle();
  else if(screen===SCR.GAME)drawGame();
  else if(screen===SCR.PAUSE){drawGame();drawPause();}
  else if(screen===SCR.OVER)drawGameOver();
  else if(screen===SCR.UPGRADE){drawGame();drawUpgradeScreen();}
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
</script>
