<body>
<a href="/" class="exit-btn">← EXIT</a>
<canvas id="game"></canvas>
<script>
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400, H = 700;
let scale = 1;

function resize() {
  const sw = window.innerWidth / W;
  const sh = window.innerHeight / H;
  scale = Math.min(sw, sh);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Orbitron font ──────────────────────────────────────────────────────────
const F = {
  title: "900 62px 'Orbitron',sans-serif",
  h1:    "900 48px 'Orbitron',sans-serif",
  h2:    "bold 28px 'Orbitron',sans-serif",
  h3:    "bold 18px 'Orbitron',sans-serif",
  body:  "bold 14px 'Orbitron',sans-serif",
  sm:    "bold 11px 'Orbitron',sans-serif",
  xs:    "bold 9px 'Orbitron',sans-serif",
  score: "900 26px 'Orbitron',sans-serif",
};

// ─── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('touchstart', resumeAC, {once:true});
document.addEventListener('mousedown',  resumeAC, {once:true});

function beep(freq, type, dur, vol=0.3, detune=0) {
  if (AC.state==='suspended') return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sfxShoot    = () => { beep(1200,'sine',0.04,0.08); beep(900,'square',0.06,0.05); };
const sfxSquish   = () => { beep(180,'sawtooth',0.16,0.24); beep(140,'square',0.1,0.14,-240); };
const sfxPowerup  = () => [440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.1,0.16),i*50));
const sfxLoseLife = () => { beep(120,'sawtooth',0.5,0.35,-320); shake(8,380); screenFlash(1,'#ff1a1a'); };
const sfxLevelUp  = () => { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,'triangle',0.14,0.18),i*70)); screenFlash(0.5,'#6bcb77'); };
const sfxBoss     = () => { beep(50,'sawtooth',1.2,0.4); beep(80,'square',0.8,0.25); screenFlash(0.7,'#ff1a1a'); };
const sfxGameOver = () => [440,392,349,311,277,246].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.32,0.22),i*120));
const sfxCombo    = (n) => beep(440+n*80,'sine',0.08,0.14);

// ─── State ──────────────────────────────────────────────────────────────────
const SCR = {TITLE:0,GAME:1,PAUSE:2,OVER:3};
let screen = SCR.TITLE;
let score=0, hiScore=parseInt(localStorage.getItem('squish_hi')||'0');
let lives=3, level=1, kills=0, lvlKills=0;
let combo=0, comboTimer=0, comboMult=1;
let shakeX=0, shakeY=0, shakeTime=0, shakeMag=0;
let frame=0, dt=0;
let rfActive=false, rfTimer=0;
let triActive=false, triTimer=0;
let shActive=false, shTimer=0;
let mxActive=false, mxTimer=0;
let bossPresent=false, boss=null;
let blobs=[], bullets=[], particles=[], powerups=[], popups=[], bossShots=[];
let cannonX=W/2, recoil=0, shootTimer=0;
let muzzleFlash=0;
let sfxFlashColor='#fff', sfxFlashAlpha=0;
let titleBlobY=310, titleBlobD=1, titleBlink=0;
let btnRects={};
let fadeAlpha=0;

const RAIL_Y = H - 102;
let dragOn=false, dragOff=0, leftBtn=false, rightBtn=false;

function shake(m,t){ shakeMag=m; shakeTime=t; }
function screenFlash(a, col='#ffffff') { sfxFlashAlpha = a; sfxFlashColor = col; }

// ─── Background elements ─────────────────────────────────────────────────────
const STARS = Array.from({length:90}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: 0.3 + Math.random()*1.6,
  vx: (Math.random()-.5)*.1,
  vy: 0.06 + Math.random()*.18,
  a: 0.15 + Math.random()*.7,
  twinklePhase: Math.random()*Math.PI*2,
  twinkleSpeed: 1 + Math.random()*3,
}));

const NEBULAE = [
  {x:80,  y:140, r:160, hue:260, a:0.06},
  {x:320, y:300, r:140, hue:180, a:0.05},
  {x:180, y:520, r:180, hue:200, a:0.04},
];

// ─── Blob smooth shape helpers ───────────────────────────────────────────────
function makeBlobPts(n=8) {
  return Array.from({length:n},(_,i)=>{
    const r=0.85+Math.random()*0.3;
    return {angle:(i/n)*Math.PI*2, r, rTarget:r, rSpeed:0.01+Math.random()*0.018};
  });
}
function updateBlobPts(pts, baseSize) {
  pts.forEach(p=>{
    p.r += (p.rTarget - p.r)*p.rSpeed;
    if(Math.abs(p.r-p.rTarget)<0.012) p.rTarget=0.72+Math.random()*0.56;
  });
}
function pathBlob(cx,cy,pts,rot,rx,ry){
  const n=pts.length;
  const coords=pts.map(p=>({
    x:cx+Math.cos(p.angle+rot)*rx*p.r,
    y:cy+Math.sin(p.angle+rot)*ry*p.r,
  }));
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const prev=coords[(i-1+n)%n], curr=coords[i], next=coords[(i+1)%n], next2=coords[(i+2)%n];
    if(i===0)ctx.moveTo(curr.x,curr.y);
    const cp1x=curr.x+(next.x-prev.x)/6, cp1y=curr.y+(next.y-prev.y)/6;
    const cp2x=next.x-(next2.x-curr.x)/6, cp2y=next.y-(next2.y-curr.y)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,next.x,next.y);
  }
  ctx.closePath();
}

// ─── Particle system ─────────────────────────────────────────────────────────
function spawnParticles(x,y,col,n=8,type='circle'){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.7, sp=1.8+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      r:2+Math.random()*5,life:1,decay:0.022+Math.random()*0.022,col,type});
  }
}
function spawnRing(x,y,col){
  particles.push({x,y,vx:0,vy:0,r:0,maxR:55+Math.random()*30,life:1,decay:0.038,col,type:'ring'});
}
function spawnSparks(x,y,col,n=6){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      r:1.5+Math.random()*1.5,life:1,decay:0.03+Math.random()*0.025,col,type:'spark',
      tx:x+Math.cos(a)*8,ty:y+Math.sin(a)*8});
  }
}
function spawnPopup(x,y,txt,col='#FFD93D'){
  popups.push({x,y,txt,col,life:1,vy:-1.8,scale:1.4});
}

// ─── Blob Types ──────────────────────────────────────────────────────────────
const BT = {
  green:{col:'#6BCB77',glow:'rgba(107,203,119,.6)',hp:1,spd:.72,pts:10, sz:22,expr:'happy', sw:.60},
  blue: {col:'#4D96FF',glow:'rgba(77,150,255,.6)', hp:2,spd:.42,pts:20, sz:28,expr:'sleepy',sw:.25},
  red:  {col:'#FF6B6B',glow:'rgba(255,107,107,.6)',hp:1,spd:1.45,pts:30,sz:17,expr:'angry', sw:.20},
  gold: {col:'#FFD93D',glow:'rgba(255,217,61,.6)', hp:1,spd:.95,pts:100,sz:22,expr:'smug',  sw:.05},
};

function availTypes(){
  const t=['green'];
  if(level>=3)t.push('blue');
  if(level>=5)t.push('red');
  if(level>=7)t.push('gold');
  return t;
}

function spawnBlob(){
  if(bossPresent) return;
  const cap=level>=10?12:level>=5?8:5;
  if(blobs.length>=cap) return;
  const types=availTypes();
  const weights=types.map(t=>BT[t].sw);
  const tot=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,cum=0,chosen='green';
  for(let i=0;i<types.length;i++){cum+=weights[i];if(r<=cum){chosen=types[i];break;}}
  const bt=BT[chosen];
  const spdScale=1+Math.floor(kills/10)*.1;
  const spd=Math.min(bt.spd*spdScale,bt.spd*3);
  blobs.push({
    x:bt.sz+Math.random()*(W-bt.sz*2), y:-bt.sz-20,
    type:chosen,col:bt.col,glow:bt.glow,hp:bt.hp,maxHp:bt.hp,
    spd,pts:bt.pts,sz:bt.sz,expr:bt.expr,
    wobble:Math.random()*Math.PI*2, rot:Math.random()*Math.PI*2,
    zz:chosen==='gold'?1:0, zzPhase:0,
    dying:false,dTimer:0,dScale:1,flash:0,
    blobPts:makeBlobPts(8),
    trail:[],
  });
}

function spawnBoss(){
  bossPresent=true; sfxBoss();
  boss={x:W/2,y:-80,targetY:90,col:'#C0392B',glow:'rgba(192,57,43,.8)',sz:60,hp:20,maxHp:20,
        spd:.5,dir:1,wobble:0,rot:0,sTimer:2.6,
        dying:false,dTimer:0,dScale:1,flash:0,arrived:false,
        blobPts:makeBlobPts(10),trail:[]};
  spawnPopup(W/2,220,'⚠ BOSS INCOMING!','#FF6B6B');
  shake(10,500);
}

// ─── Fire ────────────────────────────────────────────────────────────────────
function fire(){
  const tip={x:cannonX,y:RAIL_Y-52};
  if(triActive){
    for(const a of[-0.18,0,0.18])
      bullets.push({x:tip.x,y:tip.y,vx:Math.sin(a)*5.5,vy:-9.5,r:5,trail:[]});
  } else {
    bullets.push({x:tip.x,y:tip.y,vx:0,vy:-9.5,r:5,trail:[]});
  }
  recoil=6; sfxShoot(); muzzleFlash=6;
  spawnSparks(tip.x,tip.y,'#c9a8ff',3);
}

// ─── Power-ups ────────────────────────────────────────────────────────────────
function dropPowerup(x,y){
  if(Math.random()>.15)return;
  const types=['rapid','triple','shield','mult'];
  const cols=['#FF8C00','#9B59B6','#00BCD4','#FFD93D'];
  const icons=['⚡','✦✦✦','🛡','×2'];
  const glows=['rgba(255,140,0,.6)','rgba(155,89,182,.6)','rgba(0,188,212,.6)','rgba(255,217,61,.6)'];
  const i=Math.floor(Math.random()*4);
  powerups.push({x,y,type:types[i],col:cols[i],icon:icons[i],glow:glows[i],vy:1.1,life:1,decay:.0025,r:16,rot:0});
}
function applyPowerup(t){
  sfxPowerup();
  if(t==='rapid') {rfActive=true;rfTimer=8;}
  if(t==='triple'){triActive=true;triTimer=8;}
  if(t==='shield'){shActive=true;shTimer=10;}
  if(t==='mult')  {mxActive=true;mxTimer=10;}
}

// ─── Kill / Score ─────────────────────────────────────────────────────────────
function addKill(pts,x,y){
  combo++; comboTimer=1.6;
  const prevMult=comboMult;
  comboMult=combo>=6?4:combo>=4?3:combo>=3?2:combo>=2?1.5:1;
  if(comboMult>prevMult)sfxCombo(combo);
  const total=Math.floor(pts*comboMult*(mxActive?2:1));
  score+=total; kills++; lvlKills++;
  spawnPopup(x,y,'+'+total);
  if(comboMult>1) spawnPopup(x,y-30,'×'+comboMult,'#FF6B6B');
  if(lvlKills>=15){
    level++; lvlKills=0; sfxLevelUp();
    spawnPopup(W/2,H/2-80,'LEVEL '+level,'#6BCB77');
    if(level%5===0&&!bossPresent) spawnBoss();
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
function cpos(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:(cx-r.left)/scale, y:(cy-r.top)/scale};
}
function pDown(x,y){
  resumeAC();
  if(screen===SCR.TITLE){startGame();return;}
  if(screen===SCR.PAUSE||screen===SCR.OVER)return;
  if(y>RAIL_Y+22&&y<RAIL_Y+66){
    if(x<W/2){leftBtn=true;return;}else{rightBtn=true;return;}
  }
  if(Math.abs(x-cannonX)<44&&Math.abs(y-RAIL_Y)<44){dragOn=true;dragOff=x-cannonX;return;}
  if(y>RAIL_Y-22&&y<RAIL_Y+22){dragOn=true;dragOff=0;cannonX=x;return;}
}
function pMove(x){ if(dragOn) cannonX=Math.max(22,Math.min(W-22,x-dragOff)); }
function pUp(){dragOn=false;leftBtn=false;rightBtn=false;}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pDown(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pMove(p.x);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();pUp();
  if(e.changedTouches.length){const t=e.changedTouches[0],p=cpos(t.clientX,t.clientY);handleClick(p.x,p.y);}
},{passive:false});
canvas.addEventListener('mousedown', e=>{const p=cpos(e.clientX,e.clientY);pDown(p.x,p.y);});
canvas.addEventListener('mousemove', e=>{const p=cpos(e.clientX,e.clientY);pMove(p.x);});
canvas.addEventListener('mouseup',   pUp);
canvas.addEventListener('click',     e=>{const p=cpos(e.clientX,e.clientY);handleClick(p.x,p.y);});

function handleClick(x,y){
  const hit=r=>r&&x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;
  if(screen===SCR.OVER){if(hit(btnRects.again))startGame();if(hit(btnRects.menu))screen=SCR.TITLE;}
  if(screen===SCR.PAUSE){if(hit(btnRects.resume))screen=SCR.GAME;if(hit(btnRects.menuP))screen=SCR.TITLE;}
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')leftBtn=true;
  if(e.key==='ArrowRight')rightBtn=true;
  if(e.key==='Escape'||e.key==='p'||e.key==='P'){
    if(screen===SCR.GAME)screen=SCR.PAUSE;
    else if(screen===SCR.PAUSE)screen=SCR.GAME;
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')leftBtn=false;
  if(e.key==='ArrowRight')rightBtn=false;
});

// ─── Game init / over ─────────────────────────────────────────────────────────
function startGame(){
  screen=SCR.GAME;
  score=0;lives=3;level=1;kills=0;lvlKills=0;
  combo=0;comboTimer=0;comboMult=1;
  blobs=[];bullets=[];particles=[];powerups=[];popups=[];bossShots=[];
  boss=null;bossPresent=false;
  cannonX=W/2;shootTimer=0;frame=0;muzzleFlash=0;
  sfxFlashAlpha=0;
  rfActive=triActive=shActive=mxActive=false;
}
function gameOver(){
  screen=SCR.OVER;
  if(score>hiScore){hiScore=score;localStorage.setItem('squish_hi',hiScore);}
  sfxGameOver(); shake(14,600); screenFlash(0.8,'#ff0000');
}

// ─── Background ───────────────────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0d1a'); g.addColorStop(0.5,'#101028'); g.addColorStop(1,'#0a1628');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Nebula clouds
  for(const n of NEBULAE){
    const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    ng.addColorStop(0,`hsla(${n.hue},70%,50%,${n.a+Math.sin(frame*.008+n.hue)*.012})`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  }

  // Stars
  for(const s of STARS){
    const tw=0.5+0.5*Math.sin(frame*s.twinkleSpeed*.016+s.twinklePhase);
    ctx.globalAlpha=s.a*(0.3+0.7*tw);
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    s.y+=s.vy; s.x+=s.vx;
    if(s.y>H+2){s.y=-2;s.x=Math.random()*W;}
    if(s.x<-2||s.x>W+2)s.x=Math.random()*W;
  }
  ctx.globalAlpha=1;

  // Scanlines
  ctx.globalAlpha=0.03;
  ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3){ctx.fillRect(0,y,W,1);}
  ctx.globalAlpha=1;
}

// ─── Draw blob ────────────────────────────────────────────────────────────────
function drawBlob(b, isTitle=false){
  const s=b.sz;
  const pulse=1+0.06*Math.sin(b.wobble);
  const rx=s*(b.dying?b.dScale:1);
  const ry=s*(b.dying?1/Math.max(b.dScale,0.1):pulse);
  const col=b.flash>0?'#ffffff':b.col;

  // Trail
  if(!isTitle&&!b.dying){
    b.trail.forEach((pt,i)=>{
      const frac=i/b.trail.length;
      ctx.globalAlpha=frac*0.18;
      ctx.fillStyle=b.col;
      ctx.beginPath();ctx.ellipse(pt.x,pt.y,s*frac*0.5,s*frac*0.35,0,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  // Outer glow
  ctx.save();
  ctx.shadowColor=b.glow||b.col;
  ctx.shadowBlur=b.type==='gold'?28:18;

  // Body fill using smooth blob shape
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  const bg=ctx.createRadialGradient(b.x-rx*.3,b.y-ry*.3,0,b.x,b.y,rx*1.1);
  bg.addColorStop(0,lighten(col,40));
  bg.addColorStop(0.5,col);
  bg.addColorStop(1,darken(col,20));
  ctx.fillStyle=bg;ctx.fill();

  // Rim stroke
  ctx.strokeStyle=lighten(col,25);ctx.lineWidth=1.5;ctx.stroke();
  ctx.shadowBlur=0;

  // Specular highlight
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  ctx.clip();
  const sg=ctx.createRadialGradient(b.x-rx*.35,b.y-ry*.38,0,b.x-rx*.1,b.y-ry*.1,rx*.55);
  sg.addColorStop(0,'rgba(255,255,255,.42)');
  sg.addColorStop(0.6,'rgba(255,255,255,.08)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fill();
  ctx.restore();

  // HP dots
  if(b.maxHp>1&&b.hp>0){
    for(let i=0;i<b.hp;i++){
      ctx.beginPath();ctx.arc(b.x-4+i*8,b.y+ry*.68,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.fill();
    }
  }

  // Eyes
  drawBlobFace(b.x,b.y,s,rx,ry,b.expr,b.wobble,col);
}

function drawBlobFace(cx,cy,s,rx,ry,expr,wobble,col){
  const ey=cy-ry*.1;
  const ex1=cx-rx*.28, ex2=cx+rx*.28;
  const ew=rx*.18, eh=ry*.2;
  ctx.fillStyle='#0d0d1a';
  if(expr==='sleepy'){
    ctx.beginPath();ctx.ellipse(ex1,ey,ew,eh,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex2,ey,ew,eh,0,0,Math.PI*2);ctx.fill();
    // half-closed lids
    ctx.fillStyle=col;
    ctx.fillRect(ex1-ew-1,ey-eh-1,ew*2+2,eh+1);
    ctx.fillRect(ex2-ew-1,ey-eh-1,ew*2+2,eh+1);
  } else {
    ctx.beginPath();ctx.ellipse(ex1,ey,ew,eh,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex2,ey,ew,eh,0,0,Math.PI*2);ctx.fill();
    // shine
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath();ctx.arc(ex1+ew*.3,ey-eh*.28,ew*.28,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex2+ew*.3,ey-eh*.28,ew*.28,0,Math.PI*2);ctx.fill();
  }
  // angry brows
  if(expr==='angry'){
    ctx.strokeStyle='#0d0d1a';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(ex1-ew*1.2,ey-eh*2.2);ctx.lineTo(ex1+ew*.4,ey-eh*1.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex2+ew*1.2,ey-eh*2.2);ctx.lineTo(ex2-ew*.4,ey-eh*1.1);ctx.stroke();
  }
  // mouth
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=2;
  ctx.beginPath();
  const my=cy+ry*.34;
  if(expr==='angry'){
    ctx.moveTo(cx-rx*.3,my+4);ctx.quadraticCurveTo(cx,my-5,cx+rx*.3,my+4);
  } else if(expr==='smug'){
    ctx.moveTo(cx-rx*.2,my);ctx.quadraticCurveTo(cx+rx*.15,my+9,cx+rx*.3,my-2);
  } else {
    ctx.moveTo(cx-rx*.3,my);ctx.quadraticCurveTo(cx,my+ry*.2,cx+rx*.3,my);
  }
  ctx.stroke();
}

// ─── Draw Boss ────────────────────────────────────────────────────────────────
function drawBoss(b){
  if(!b)return;
  const s=b.sz;
  const pulse=1+0.07*Math.sin(b.wobble);
  const rx=s*(b.dying?b.dScale:1);
  const ry=s*(b.dying?1/Math.max(b.dScale,0.1):pulse);

  // Trail
  b.trail.forEach((pt,i)=>{
    const frac=i/b.trail.length;
    ctx.globalAlpha=frac*0.15;
    ctx.fillStyle='#C0392B';
    ctx.beginPath();ctx.arc(pt.x,pt.y,s*frac*0.6,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  ctx.save();

  // Outer danger glow
  ctx.shadowColor='#ff0000';ctx.shadowBlur=40;
  ctx.beginPath();ctx.arc(b.x,b.y,rx*1.5,0,Math.PI*2);
  const outerG=ctx.createRadialGradient(b.x,b.y,rx*.5,b.x,b.y,rx*1.5);
  outerG.addColorStop(0,'rgba(255,0,0,0.1)');
  outerG.addColorStop(1,'transparent');
  ctx.fillStyle=outerG;ctx.fill();

  // Spikes
  ctx.shadowColor='#ff0000';ctx.shadowBlur=15;
  for(let i=0;i<10;i++){
    const a=(Math.PI*2/10)*i+b.wobble*.5;
    const x1=b.x+Math.cos(a)*(rx-4), y1=b.y+Math.sin(a)*(ry-4);
    const x2=b.x+Math.cos(a+.16)*(rx+22), y2=b.y+Math.sin(a+.16)*(ry+22);
    const x3=b.x+Math.cos(a-.16)*(rx+22), y3=b.y+Math.sin(a-.16)*(ry+22);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);
    ctx.closePath();
    const sc=b.flash>0?'#ff4444':'#7B241C';
    ctx.fillStyle=sc;ctx.fill();
  }

  // Body
  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  const bg=ctx.createRadialGradient(b.x-rx*.3,b.y-ry*.3,0,b.x,b.y,rx*1.1);
  bg.addColorStop(0,'#e74c3c');
  bg.addColorStop(0.5,b.flash>0?'#fff':'#C0392B');
  bg.addColorStop(1,'#7B241C');
  ctx.fillStyle=bg;ctx.fill();
  ctx.shadowBlur=0;

  pathBlob(b.x,b.y,b.blobPts,b.rot,rx,ry);
  ctx.clip();
  const sg=ctx.createRadialGradient(b.x-rx*.32,b.y-ry*.32,0,b.x-rx*.1,b.y-ry*.1,rx*.5);
  sg.addColorStop(0,'rgba(255,255,255,.28)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.fill();
  ctx.restore();

  // Yellow glowing eyes
  const ey=b.y-ry*.1;
  ctx.save();ctx.shadowColor='#FFD93D';ctx.shadowBlur=14;
  ctx.fillStyle='#FFD93D';
  ctx.beginPath();ctx.arc(b.x-rx*.3,ey,rx*.14,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+rx*.3,ey,rx*.14,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
  ctx.fillStyle='#0d0d1a';
  ctx.beginPath();ctx.arc(b.x-rx*.3+2,ey,rx*.06,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(b.x+rx*.3+2,ey,rx*.06,0,Math.PI*2);ctx.fill();
  // Brows
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=3.5;
  ctx.beginPath();ctx.moveTo(b.x-rx*.52,ey-ry*.22);ctx.lineTo(b.x-rx*.16,ey-ry*.12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(b.x+rx*.52,ey-ry*.22);ctx.lineTo(b.x+rx*.16,ey-ry*.12);ctx.stroke();
  // Jagged mouth
  ctx.strokeStyle='#0d0d1a';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(b.x-rx*.4,b.y+ry*.3);
  for(let i=0;i<6;i++){
    const mx=b.x-rx*.4+(i+.5)*(rx*.8/6);
    ctx.lineTo(mx,i%2===0?b.y+ry*.45:b.y+ry*.25);
  }
  ctx.lineTo(b.x+rx*.4,b.y+ry*.3);ctx.stroke();
}

}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(d){
  dt=d; frame++;

  // Screen flash decay
  sfxFlashAlpha=Math.max(0,sfxFlashAlpha-dt*4);
  muzzleFlash=Math.max(0,muzzleFlash-1);

  if(screen!==SCR.GAME)return;

  // Shake
  if(shakeTime>0){shakeTime-=dt*1000;shakeX=(Math.random()-.5)*shakeMag*2;shakeY=(Math.random()-.5)*shakeMag*2;}
  else{shakeX=0;shakeY=0;if(shakeMag>0)shakeMag=0;}

  // Cannon
  if(leftBtn) cannonX=Math.max(22,cannonX-4.5);
  if(rightBtn)cannonX=Math.min(W-22,cannonX+4.5);
  if(recoil>0)recoil=Math.max(0,recoil-.55);

  // Auto-fire
  const rate=rfActive?.14:.5;
  shootTimer+=dt;
  if(shootTimer>=rate){shootTimer=0;fire();}

  // Timers
  if(rfActive){rfTimer-=dt;if(rfTimer<=0)rfActive=false;}
  if(triActive){triTimer-=dt;if(triTimer<=0)triActive=false;}
  if(shActive){shTimer-=dt;if(shTimer<=0)shActive=false;}
  if(mxActive){mxTimer-=dt;if(mxTimer<=0)mxActive=false;}
  if(combo>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1;}}

  // Spawn blobs
  if(Math.random()<.028+level*.005)spawnBlob();

  // Update blobs
  for(let i=blobs.length-1;i>=0;i--){
    const b=blobs[i];
    b.wobble+=.065; b.rot+=.012;
    b.flash=Math.max(0,b.flash-dt*6);
    updateBlobPts(b.blobPts, b.sz);
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>14)b.trail.shift();

    if(b.dying){
      b.dTimer+=dt; b.dScale=Math.max(0,1-b.dTimer*4.5);
      if(b.dScale<=0)blobs.splice(i,1);
      continue;
    }
    b.y+=b.spd;
    if(b.zz){b.zzPhase+=.045;b.x+=Math.sin(b.zzPhase)*2;b.x=Math.max(b.sz,Math.min(W-b.sz,b.x));}
    if(b.y>H-48){
      blobs.splice(i,1);
      if(shActive){shActive=false;shTimer=0;spawnPopup(W/2,H/2,'BLOCKED!','#00BCD4');}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }

  // Update boss
  if(bossPresent&&boss){
    boss.wobble+=.04; boss.rot+=.008;
    boss.flash=Math.max(0,boss.flash-dt*6);
    updateBlobPts(boss.blobPts, boss.sz);
    boss.trail.push({x:boss.x,y:boss.y});
    if(boss.trail.length>16)boss.trail.shift();

    if(boss.dying){
      boss.dTimer+=dt; boss.dScale=Math.max(0,1-boss.dTimer*2.8);
      if(boss.dScale<=0){boss=null;bossPresent=false;}
    } else {
      if(!boss.arrived){boss.y+=2.8;if(boss.y>=boss.targetY)boss.arrived=true;}
      else{
        boss.x+=boss.spd*boss.dir;
        if(boss.x>W-boss.sz||boss.x<boss.sz)boss.dir*=-1;
        boss.spd=Math.min(3,.5+((boss.maxHp-boss.hp)/boss.maxHp)*2.5);
      }
      boss.sTimer-=dt;
      if(boss.sTimer<=0){
        boss.sTimer=2.4+(Math.random()-.5)*.6;
        bossShots.push({x:boss.x,y:boss.y+boss.sz,vx:(Math.random()-.5)*3.5,vy:4,r:9,trail:[]});
      }
      if(boss.y>H-70){
        bossPresent=false;boss=null;
        if(shActive){shActive=false;shTimer=0;}
        else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
      }
    }
  }

  // Boss shots
  for(let i=bossShots.length-1;i>=0;i--){
    const p=bossShots[i];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>8)p.trail.shift();
    p.x+=p.vx; p.y+=p.vy;
    if(p.y>H+10||p.x<-20||p.x>W+20){bossShots.splice(i,1);continue;}
    const dx=p.x-cannonX,dy=p.y-(RAIL_Y-10);
    if(Math.sqrt(dx*dx+dy*dy)<p.r+22){
      bossShots.splice(i,1);
      if(shActive){shActive=false;shTimer=0;spawnPopup(W/2,H/2,'BLOCKED!','#00BCD4');}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>7)b.trail.shift();
    b.x+=b.vx; b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20){bullets.splice(i,1);continue;}
    let hit=false;
    if(bossPresent&&boss&&!boss.dying){
      const dx=b.x-boss.x,dy=b.y-boss.y;
      if(Math.sqrt(dx*dx+dy*dy)<boss.sz+b.r){
        bullets.splice(i,1);boss.hp--;boss.flash=.25;
        spawnSparks(b.x,b.y,'#FF6B6B',4);
        if(boss.hp<=0){
          addKill(500,boss.x,boss.y);boss.dying=true;
          spawnParticles(boss.x,boss.y,'#C0392B',20);
          spawnRing(boss.x,boss.y,'#FF6B6B');
          spawnSparks(boss.x,boss.y,'#FFD93D',14);
          dropPowerup(boss.x,boss.y);
          screenFlash(0.5,'#ff6600');
        }
        hit=true;
      }
    }
    if(hit)continue;
    for(let j=blobs.length-1;j>=0;j--){
      const bl=blobs[j];
      if(bl.dying)continue;
      const dx=b.x-bl.x,dy=b.y-bl.y;
      if(Math.sqrt(dx*dx+dy*dy)<bl.sz+b.r){
        bullets.splice(i,1);bl.hp--;bl.flash=.32;
        spawnSparks(b.x,b.y,bl.col,3);
        if(bl.hp<=0){
          bl.dying=true; sfxSquish();
          spawnParticles(bl.x,bl.y,bl.col,10+Math.floor(Math.random()*5));
          spawnRing(bl.x,bl.y,bl.col);
          dropPowerup(bl.x,bl.y);
          addKill(bl.pts,bl.x,bl.y);
        }
        hit=true;break;
      }
    }
  }

  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.y+=p.vy; p.life-=p.decay; p.rot+=0.04;
    if(p.y>H||p.life<=0){powerups.splice(i,1);continue;}
    const dx=p.x-cannonX,dy=p.y-(RAIL_Y-10);
    if(Math.sqrt(dx*dx+dy*dy)<p.r+28){
      applyPowerup(p.type);
      spawnPopup(p.x,p.y,p.type.toUpperCase(),'#00BCD4');
      powerups.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.type==='ring'){
      p.r+=(p.maxR-p.r)*0.12;
      p.life-=p.decay;
    } else {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.07; p.life-=p.decay;
    }
    if(p.life<=0)particles.splice(i,1);
  }

  // Popups
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i]; p.y+=p.vy; p.life-=.022;
    p.scale=Math.max(1,p.scale-0.04);
    if(p.life<=0)popups.splice(i,1);
  }
}

// ─── Draw Game ────────────────────────────────────────────────────────────────
function drawGame(){
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBg();

  // Blobs
  for(const b of blobs)drawBlob(b);
  if(bossPresent&&boss)drawBoss(boss);

  // Bullets with trails
  for(const b of bullets){
    b.trail.forEach((pt,i)=>{
      const frac=(i/b.trail.length);
      ctx.globalAlpha=frac*0.35;
      ctx.fillStyle=triActive?'#b27af7':'#ddbcff';
      ctx.beginPath();ctx.arc(pt.x,pt.y,b.r*frac,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.save();ctx.shadowColor='#c9a8ff';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    const bg=ctx.createRadialGradient(b.x-1,b.y-1,0,b.x,b.y,b.r);
    bg.addColorStop(0,'#fff');bg.addColorStop(0.5,'#E0C8FF');bg.addColorStop(1,'#845EC2');
    ctx.fillStyle=bg;ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }

  // Boss shots with trails
  for(const p of bossShots){
    p.trail.forEach((pt,i)=>{
      const frac=i/p.trail.length;
      ctx.globalAlpha=frac*0.3;
      ctx.fillStyle='#FF6B6B';
      ctx.beginPath();ctx.arc(pt.x,pt.y,p.r*frac,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.save();ctx.shadowColor='#FF6B6B';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    const bg=ctx.createRadialGradient(p.x-2,p.y-2,0,p.x,p.y,p.r);
    bg.addColorStop(0,'#FF9999');bg.addColorStop(1,'#C0392B');
    ctx.fillStyle=bg;ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }

  // Power-ups
  for(const p of powerups){
    ctx.save();ctx.globalAlpha=Math.min(1,p.life*1.5);
    ctx.shadowColor=p.glow||p.col;ctx.shadowBlur=20;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);
    const pg=ctx.createRadialGradient(0,0,0,0,0,p.r);
    pg.addColorStop(0,lighten(p.col,20));pg.addColorStop(1,p.col);
    ctx.fillStyle=pg;ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='bold 12px Arial';ctx.fillStyle='#fff';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.icon,0,0);
    ctx.restore();
  }

  // Particles
  for(const p of particles){
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='ring'){
      ctx.strokeStyle=p.col;ctx.lineWidth=2*(p.life);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    } else if(p.type==='spark'){
      ctx.strokeStyle=p.col;ctx.lineWidth=1.5*p.life;
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3);ctx.stroke();
    } else {
      ctx.shadowColor=p.col;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.fill();
    }
    ctx.restore();
  }

  // Popups
  for(const p of popups){
    ctx.save();ctx.globalAlpha=Math.min(1,p.life*2);
    ctx.shadowColor=p.col;ctx.shadowBlur=10;
    ctx.save();ctx.translate(p.x,p.y);ctx.scale(p.scale,p.scale);
    ctx.fillStyle=p.col;ctx.font=F.body;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.txt,0,0);
    ctx.restore();ctx.restore();
  }

  drawRail();drawCannon();drawHUD();
  ctx.restore();

  // Screen flash overlay
  if(sfxFlashAlpha>0){
    ctx.globalAlpha=sfxFlashAlpha;
    ctx.fillStyle=sfxFlashColor;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function rr(x,y,w,h,r,fill,stroke,sw=2){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function lighten(hex,pct){
  try{
    const n=parseInt(hex.replace('#',''),16);
    const r=Math.min(255,((n>>16)&0xff)+pct*2.5|0);
    const g=Math.min(255,((n>>8)&0xff)+pct*2.5|0);
    const b=Math.min(255,(n&0xff)+pct*2.5|0);
    return `rgb(${r},${g},${b})`;
  }catch{return hex;}
}
function darken(hex,pct){
  try{
    const n=parseInt(hex.replace('#',''),16);
    const r=Math.max(0,((n>>16)&0xff)-pct*2|0);
    const g=Math.max(0,((n>>8)&0xff)-pct*2|0);
    const b=Math.max(0,(n&0xff)-pct*2|0);
    return `rgb(${r},${g},${b})`;
  }catch{return hex;}
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastT=0;
function loop(now){
  const d=Math.min((now-lastT)/1000,.05);lastT=now;
  update(d);
  ctx.clearRect(0,0,W,H);
  if(screen===SCR.TITLE)drawTitle();
  else if(screen===SCR.GAME)drawGame();
  else if(screen===SCR.PAUSE){drawGame();drawPause();}
  else if(screen===SCR.OVER)drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
</script>
