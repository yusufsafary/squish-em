body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

canvas{display:block;image-rendering:pixelated;}
@media(max-width:600px){.nav-links{display:none;}}

<div class="game-wrap">
  <canvas id="game"></canvas>
</div>

<script>
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400, H = 700;
let scale = 1;

function resize() {
  const wrap = canvas.parentElement;
  const sw = wrap.clientWidth / W;
  const sh = wrap.clientHeight / H;
  scale = Math.min(sw, sh);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('touchstart', resumeAC, {once:true});
document.addEventListener('mousedown',  resumeAC, {once:true});

function beep(freq, type, dur, vol=0.3, detune=0) {
  if (AC.state==='suspended') return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sfxShoot    = () => beep(880,'sine',0.07,0.12);
const sfxSquish   = () => { beep(200,'sawtooth',0.13,0.22); beep(160,'square',0.09,0.12,-220); };
const sfxPowerup  = () => [440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.1,0.18),i*55));
const sfxLoseLife = () => { beep(140,'sawtooth',0.45,0.32,-300); shake(6,320); };
const sfxLevelUp  = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'triangle',0.14,0.18),i*75));
const sfxBoss     = () => beep(55,'sawtooth',1.1,0.38);
const sfxGameOver = () => [523,494,440,392,349].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.28,0.22),i*110));

// ─── State ──────────────────────────────────────────────────────────────────
const SCR = {TITLE:0,GAME:1,PAUSE:2,OVER:3};
let screen = SCR.TITLE;
let score=0, hiScore=parseInt(localStorage.getItem('squish_hi')||'0');
let lives=3, level=1, kills=0, lvlKills=0;
let combo=0, comboTimer=0, comboMult=1;
let shakeX=0, shakeY=0, shakeTime=0, shakeMag=0;
let frame=0;
let rfActive=false, rfTimer=0;
let triActive=false, triTimer=0;
let shActive=false, shTimer=0;
let mxActive=false, mxTimer=0;
let bossPresent=false, boss=null;
let blobs=[], bullets=[], particles=[], powerups=[], popups=[], bossShots=[];
let cannonX=W/2, recoil=0, shootTimer=0;
const RAIL_Y=H-102;
let dragOn=false, dragOff=0, leftBtn=false, rightBtn=false;
let titleBlobY=320, titleBlobD=1, titleBlink=0;
let btnRects={};

// ─── Stars ──────────────────────────────────────────────────────────────────
const STARS = Array.from({length:22},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:.4+Math.random()*1.4, vx:(Math.random()-.5)*.15,
  vy:.1+Math.random()*.18, a:.15+Math.random()*.45
}));

// ─── Helpers ────────────────────────────────────────────────────────────────
function shake(m,t){ shakeMag=m; shakeTime=t; }
function spawnParticles(x,y,col,n=6){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.5, sp=1.6+Math.random()*2.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:3+Math.random()*4,life:1,decay:.028+Math.random()*.025,col});
  }
}
function spawnPopup(x,y,txt,col='#FFD93D'){
  popups.push({x,y,txt,col,life:1,vy:-1.4});
}
function rr(x,y,w,h,r,fill,stroke,sw=2){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}

// ─── Blob Types ─────────────────────────────────────────────────────────────
const BT = {
  green:{col:'#6BCB77',hp:1,spd:.72,pts:10, sz:22,expr:'happy', sw:.60},
  blue: {col:'#4D96FF',hp:2,spd:.42,pts:20, sz:28,expr:'sleepy',sw:.25},
  red:  {col:'#FF6B6B',hp:1,spd:1.45,pts:30,sz:17,expr:'angry', sw:.20},
  gold: {col:'#FFD93D',hp:1,spd:.95,pts:100,sz:22,expr:'smug',  sw:.05},
};

function availTypes(){
  const t=['green'];
  if(level>=3)t.push('blue');
  if(level>=5)t.push('red');
  if(level>=7)t.push('gold');
  return t;
}
function spawnBlob(){
  if(bossPresent) return;
  const cap=level>=10?12:level>=5?8:5;
  if(blobs.length>=cap) return;
  const types=availTypes();
  const weights=types.map(t=>BT[t].sw);
  const tot=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,cum=0,chosen='green';
  for(let i=0;i<types.length;i++){cum+=weights[i];if(r<=cum){chosen=types[i];break;}}
  const bt=BT[chosen];
  const spdScale=1+Math.floor(kills/10)*.1;
  const spd=Math.min(bt.spd*spdScale,bt.spd*3);
  blobs.push({
    x:bt.sz+Math.random()*(W-bt.sz*2), y:-bt.sz,
    type:chosen,col:bt.col,hp:bt.hp,maxHp:bt.hp,
    spd,pts:bt.pts,sz:bt.sz,expr:bt.expr,
    wobble:Math.random()*Math.PI*2,
    zz:chosen==='gold'?1:0, zzPhase:0,
    dying:false,dTimer:0,dScale:1,flash:0
  });
}
function spawnBoss(){
  bossPresent=true; sfxBoss();
  boss={x:W/2,y:-62,targetY:82,col:'#C0392B',sz:56,hp:20,maxHp:20,
        spd:.5,dir:1,wobble:0,sTimer:2.8,
        dying:false,dTimer:0,dScale:1,flash:0,arrived:false};
  spawnPopup(W/2,200,'⚠ BOSS!','#FF6B6B');
}

// ─── Bullets ────────────────────────────────────────────────────────────────
function fire(){
  if(triActive){
    for(const a of [-0.17,0,0.17])
      bullets.push({x:cannonX,y:RAIL_Y-44,vx:Math.sin(a)*5.2,vy:-9.2,r:5});
  } else {
    bullets.push({x:cannonX,y:RAIL_Y-44,vx:0,vy:-9.2,r:5});
  }
  recoil=4; sfxShoot();
}

// ─── Power-ups ──────────────────────────────────────────────────────────────
function dropPowerup(x,y){
  if(Math.random()>.15)return;
  const types=['rapid','triple','shield','mult'];
  const cols=['#FF8C00','#9B59B6','#00BCD4','#FFD93D'];
  const icons=['🔥','✦✦✦','🛡','×2'];
  const i=Math.floor(Math.random()*4);
  powerups.push({x,y,type:types[i],col:cols[i],icon:icons[i],vy:1.3,life:1,decay:.003,r:14});
}
function applyPowerup(t){
  sfxPowerup();
  if(t==='rapid') {rfActive=true;rfTimer=8;}
  if(t==='triple'){triActive=true;triTimer=8;}
  if(t==='shield'){shActive=true;shTimer=10;}
  if(t==='mult')  {mxActive=true;mxTimer=10;}
}

// ─── Kill / Score ────────────────────────────────────────────────────────────
function addKill(pts,x,y){
  combo++; comboTimer=1.5;
  comboMult=combo>=4?3:combo>=3?2:combo>=2?1.5:1;
  const total=Math.floor(pts*comboMult*(mxActive?2:1));
  score+=total; kills++; lvlKills++;
  spawnPopup(x,y,'+'+total);
  if(comboMult>1) spawnPopup(x,y-30,'×'+comboMult,'#FF6B6B');
  if(lvlKills>=15){
    level++; lvlKills=0; sfxLevelUp();
    spawnPopup(W/2,H/2-60,'LEVEL '+level+'!','#6BCB77');
    if(level%5===0&&!bossPresent) spawnBoss();
  }
}

// ─── Input ──────────────────────────────────────────────────────────────────
function cpos(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:(cx-r.left)/scale, y:(cy-r.top)/scale};
}
function pDown(x,y){
  resumeAC();
  if(screen===SCR.TITLE){startGame();return;}
  if(screen===SCR.PAUSE||screen===SCR.OVER)return;
  if(y>RAIL_Y+22&&y<RAIL_Y+66){
    if(x<W/2){leftBtn=true;return;}else{rightBtn=true;return;}
  }
  if(Math.abs(x-cannonX)<44&&Math.abs(y-RAIL_Y)<44){dragOn=true;dragOff=x-cannonX;return;}
  if(y>RAIL_Y-22&&y<RAIL_Y+22){dragOn=true;dragOff=0;cannonX=x;return;}
}
function pMove(x){
  if(dragOn) cannonX=Math.max(22,Math.min(W-22,x-dragOff));
}
function pUp(){dragOn=false;leftBtn=false;rightBtn=false;}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pDown(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];const p=cpos(t.clientX,t.clientY);pMove(p.x);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();pUp();},{passive:false});
canvas.addEventListener('mousedown', e=>{const p=cpos(e.clientX,e.clientY);pDown(p.x,p.y);});
canvas.addEventListener('mousemove', e=>{const p=cpos(e.clientX,e.clientY);pMove(p.x);});
canvas.addEventListener('mouseup',   pUp);
canvas.addEventListener('click', e=>{
  const p=cpos(e.clientX,e.clientY);
  const hit=r=>r&&p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h;
  if(screen===SCR.OVER){if(hit(btnRects.again))startGame();if(hit(btnRects.menu))screen=SCR.TITLE;}
  if(screen===SCR.PAUSE){if(hit(btnRects.resume))screen=SCR.GAME;if(hit(btnRects.menuP))screen=SCR.TITLE;}
});
canvas.addEventListener('touchend', e=>{
  if(e.changedTouches.length){
    const t=e.changedTouches[0],p=cpos(t.clientX,t.clientY);
    const hit=r=>r&&p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h;
    if(screen===SCR.OVER){if(hit(btnRects.again))startGame();if(hit(btnRects.menu))screen=SCR.TITLE;}
    if(screen===SCR.PAUSE){if(hit(btnRects.resume))screen=SCR.GAME;if(hit(btnRects.menuP))screen=SCR.TITLE;}
  }
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')leftBtn=true;
  if(e.key==='ArrowRight')rightBtn=true;
  if(e.key==='Escape'||e.key==='p'||e.key==='P'){
    if(screen===SCR.GAME)screen=SCR.PAUSE;
    else if(screen===SCR.PAUSE)screen=SCR.GAME;
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')leftBtn=false;
  if(e.key==='ArrowRight')rightBtn=false;
});

// ─── Game init / over ───────────────────────────────────────────────────────
function startGame(){
  screen=SCR.GAME;
  score=0;lives=3;level=1;kills=0;lvlKills=0;
  combo=0;comboTimer=0;comboMult=1;
  blobs=[];bullets=[];particles=[];powerups=[];popups=[];bossShots=[];
  boss=null;bossPresent=false;
  cannonX=W/2;shootTimer=0;frame=0;
  rfActive=triActive=shActive=mxActive=false;
}
function gameOver(){
  screen=SCR.OVER;
  if(score>hiScore){hiScore=score;localStorage.setItem('squish_hi',hiScore);}
  sfxGameOver();
}

// ─── Drawing ────────────────────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1a2e'); g.addColorStop(1,'#16213e');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of STARS){
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
  }
}

function drawBlob(b){
  const wy=Math.sin(b.wobble)*.05;
  ctx.save();ctx.translate(b.x,b.y);
  if(b.dying)ctx.scale(b.dScale,1/b.dScale);
  else ctx.scale(1,1+wy);
  const s=b.sz, col=b.flash>0?'#ffffff':b.col;
  // shadow
  ctx.beginPath();ctx.ellipse(2,5,s*.78,s*.38,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.fill();
  // gold glow
  if(b.type==='gold'){ctx.shadowColor='#FFD93D';ctx.shadowBlur=18;}
  // body
  ctx.beginPath();ctx.ellipse(0,0,s,s*.85,0,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();
  // highlight
  ctx.beginPath();ctx.ellipse(-s*.28,-s*.32,s*.32,s*.22,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.33)';ctx.fill();
  ctx.shadowBlur=0;
  // hp dots
  if(b.maxHp>1&&b.hp>0){
    for(let i=0;i<b.hp;i++){
      ctx.beginPath();ctx.arc(-4+i*8,s*.62,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
    }
  }
  // eyes
  const ey=-s*.1;
  if(b.expr==='sleepy'){
    ctx.beginPath();ctx.arc(-s*.28,ey,4,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
    ctx.beginPath();ctx.arc(s*.28,ey,4,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
    ctx.beginPath();ctx.rect(-s*.28-5,ey-4,10,4);ctx.fillStyle=col;ctx.fill();
    ctx.beginPath();ctx.rect(s*.28-5,ey-4,10,4);ctx.fillStyle=col;ctx.fill();
  } else if(b.expr==='smug'){
    ctx.beginPath();ctx.arc(-s*.28,ey,4,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
    ctx.beginPath();ctx.arc(-s*.28+1,ey-1,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(s*.28,ey,4,Math.PI,0);ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;ctx.stroke();
  } else {
    ctx.beginPath();ctx.arc(-s*.28,ey,4,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
    ctx.beginPath();ctx.arc(s*.28,ey,4,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
    ctx.beginPath();ctx.arc(-s*.28+1,ey-1,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(s*.28+1,ey-1,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  }
  // angry brows
  if(b.expr==='angry'){
    ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(-s*.44,ey-9);ctx.lineTo(-s*.14,ey-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*.44,ey-9);ctx.lineTo(s*.14,ey-4);ctx.stroke();
  }
  // mouth
  const my=s*.3;
  ctx.beginPath();
  if(b.expr==='angry'){
    ctx.moveTo(-s*.3,my+5);ctx.quadraticCurveTo(0,my-4,s*.3,my+5);
  } else if(b.expr==='smug'){
    ctx.moveTo(-s*.2,my);ctx.quadraticCurveTo(s*.1,my+9,s*.3,my-2);
  } else {
    ctx.moveTo(-s*.3,my);ctx.quadraticCurveTo(0,my+11,s*.3,my);
  }
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2.5;ctx.stroke();
  ctx.restore();
}

function drawBoss(b){
  if(!b)return;
  const s=b.sz;
  ctx.save();ctx.translate(b.x,b.y);
  if(b.dying)ctx.scale(b.dScale,1/b.dScale);
  else ctx.scale(1,1+Math.sin(b.wobble)*.04);
  ctx.shadowColor='#FF0000';ctx.shadowBlur=28;
  // spikes
  for(let i=0;i<8;i++){
    const a=(Math.PI*2/8)*i+b.wobble*.4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*(s-5),Math.sin(a)*(s-5));
    ctx.lineTo(Math.cos(a+.2)*(s+16),Math.sin(a+.2)*(s+16));
    ctx.lineTo(Math.cos(a-.2)*(s+16),Math.sin(a-.2)*(s+16));
    ctx.closePath();ctx.fillStyle='#7B241C';ctx.fill();
  }
  // body
  ctx.beginPath();ctx.ellipse(0,0,s,s*.85,0,0,Math.PI*2);
  ctx.fillStyle=b.flash>0?'#fff':'#C0392B';ctx.fill();
  ctx.shadowBlur=0;
  // highlight
  ctx.beginPath();ctx.ellipse(-s*.28,-s*.3,s*.3,s*.18,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();
  // eyes
  ctx.fillStyle='#FFD93D';
  ctx.beginPath();ctx.arc(-s*.3,-s*.1,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*.3,-s*.1,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-s*.3,-s*.1,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*.3,-s*.1,3.5,0,Math.PI*2);ctx.fill();
  // brows
  ctx.strokeStyle='#000';ctx.lineWidth=3.5;
  ctx.beginPath();ctx.moveTo(-s*.44,-s*.24);ctx.lineTo(-s*.15,-s*.18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.44,-s*.24);ctx.lineTo(s*.15,-s*.18);ctx.stroke();
  // jagged mouth
  ctx.beginPath();ctx.moveTo(-s*.4,s*.28);
  for(let i=0;i<5;i++){
    const mx=-s*.4+(i+.5)*(s*.8/5);
    ctx.lineTo(mx,i%2===0?s*.4:s*.22);
  }
  ctx.lineTo(s*.4,s*.28);ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.stroke();
  ctx.restore();
}

function drawCannon(){
  const x=cannonX, y=RAIL_Y-recoil;
  ctx.save();
  if(recoil>1){ctx.shadowColor='#b27af7';ctx.shadowBlur=20;}
  rr(x-20,y+2,40,18,6,'#9B89B2');
  rr(x-14,y-20,28,26,9,'#845EC2');
  rr(x-7,y-40,14,24,4,'#6A3D9A');
  ctx.shadowColor='#c9a8ff';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(x,y-42,5.5,0,Math.PI*2);
  ctx.fillStyle='#E0C8FF';ctx.fill();
  ctx.shadowBlur=0;
  if(shActive){
    ctx.beginPath();ctx.arc(x,y-10,38,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,188,212,${.38+Math.sin(frame*.12)*.18})`;
    ctx.lineWidth=4;ctx.stroke();
  }
  ctx.restore();
}

function drawRail(){
  const g=ctx.createLinearGradient(0,RAIL_Y,0,RAIL_Y+8);
  g.addColorStop(0,'#C3B1E1');g.addColorStop(1,'#7D6B99');
  rr(18,RAIL_Y+2,W-36,8,4,g);
  const by=RAIL_Y+28, bw=58, bh=38;
  rr(18,by,bw,bh,11,'rgba(132,94,194,.7)','#9B89B2',2);
  ctx.fillStyle='#fff';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('◀',18+bw/2,by+bh/2);
  btnRects.left={x:18,y:by,w:bw,h:bh};
  rr(W-18-bw,by,bw,bh,11,'rgba(132,94,194,.7)','#9B89B2',2);
  ctx.fillText('▶',W-18-bw/2,by+bh/2);
  btnRects.right={x:W-18-bw,y:by,w:bw,h:bh};
}

function drawHUD(){
  // Score
  ctx.fillStyle='#fff';ctx.font='bold 23px Arial';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(score,12,12);
  // Hi
  ctx.textAlign='center';ctx.fillStyle='#FFD93D';ctx.font='bold 12px Arial';
  ctx.fillText('BEST',W/2,11);
  ctx.fillStyle='#fff';ctx.font='bold 17px Arial';
  ctx.fillText(Math.max(score,hiScore),W/2,26);
  // Lives
  ctx.textAlign='right';ctx.font='19px Arial';
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<lives?'#FF6B6B':'rgba(255,107,107,.22)';
    ctx.fillText('♥',W-12-i*25,12);
  }
  // Level
  ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.font='bold 12px Arial';ctx.fillText('LVL '+level,12,38);
  // Power-up bars
  let by2=58;
  const bar=(lbl,t,mx,col)=>{
    if(t<=0)return;
    const bw2=110,bh=7,bx=(W-bw2)/2;
    rr(bx,by2,bw2,bh,4,'rgba(0,0,0,.4)');
    rr(bx,by2,bw2*(t/mx),bh,4,col);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='9px Arial';ctx.textAlign='center';
    ctx.fillText(lbl,W/2,by2+13);by2+=18;
  };
  bar('RAPID FIRE',rfTimer,8,'#FF8C00');
  bar('TRIPLE SHOT',triTimer,8,'#9B59B6');
  bar('SHIELD',shTimer,10,'#00BCD4');
  bar('SCORE ×2',mxTimer,10,'#FFD93D');
  // Boss HP bar
  if(bossPresent&&boss){
    const bw2=W-36,bh=13,bx=18,by3=H-178;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by3,bw2,bh);
    const g=ctx.createLinearGradient(bx,0,bx+bw2,0);
    g.addColorStop(0,'#922B21');g.addColorStop(1,'#FF6B6B');
    ctx.fillStyle=g;ctx.fillRect(bx,by3,bw2*(boss.hp/boss.maxHp),bh);
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;ctx.strokeRect(bx,by3,bw2,bh);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold 10px Arial';
    ctx.textAlign='center';ctx.fillText('BOSS HP  '+boss.hp+' / '+boss.maxHp,W/2,by3+bh+12);
  }
  // Pause hint
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='10px Arial';
  ctx.textAlign='right';ctx.fillText('P = pause',W-10,H-6);
}

function drawTitle(){
  drawBg();
  ctx.save();
  ctx.shadowColor='#6BCB77';ctx.shadowBlur=30;
  ctx.fillStyle='#6BCB77';ctx.font='bold 62px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText("SQUISH 'EM!",W/2,118);
  ctx.shadowBlur=0;ctx.restore();
  ctx.fillStyle='rgba(107,203,119,.65)';ctx.font='bold 17px Arial';
  ctx.textAlign='center';ctx.fillText('blob shooter',W/2,168);
  titleBlobY+=.85*titleBlobD;
  if(titleBlobY>334)titleBlobD=-1;if(titleBlobY<310)titleBlobD=1;
  drawBlob({x:W/2,y:titleBlobY,type:'green',col:'#6BCB77',sz:36,hp:1,maxHp:1,expr:'happy',wobble:frame*.055,flash:0,dying:false,zz:0});
  titleBlink+=.042;
  if(Math.sin(titleBlink)>0){
    ctx.fillStyle='#fff';ctx.font='bold 23px Arial';ctx.textAlign='center';
    ctx.fillText('TAP TO PLAY',W/2,448);
  }
  if(hiScore>0){
    ctx.fillStyle='#FFD93D';ctx.font='bold 16px Arial';
    ctx.fillText('🏆 BEST: '+hiScore,W/2,500);
  }
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='13px Arial';
  ctx.fillText('Drag cannon  •  Arrow buttons  •  P = pause',W/2,548);
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 56px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('PAUSED',W/2,260);
  const bx=W/2-82,bw=164,bh=52;
  rr(bx,315,bw,bh,15,'#6BCB77','#4a9a58',2);
  ctx.fillStyle='#1a1a2e';ctx.font='bold 20px Arial';ctx.fillText('RESUME',W/2,341);
  btnRects.resume={x:bx,y:315,w:bw,h:bh};
  rr(bx,385,bw,bh,15,'rgba(100,100,150,.8)','#8888aa',2);
  ctx.fillStyle='#fff';ctx.fillText('MAIN MENU',W/2,411);
  btnRects.menuP={x:bx,y:385,w:bw,h:bh};
}

function drawGameOver(){
  drawBg();
  ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(107,203,119,.65)';ctx.font='bold 22px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText("SQUISH 'EM!",W/2,82);
  ctx.fillStyle='#FF6B6B';ctx.font='bold 66px Arial';
  ctx.fillText('GAME',W/2,198);ctx.fillText('OVER',W/2,268);
  ctx.fillStyle='#fff';ctx.font='bold 26px Arial';
  ctx.fillText('Score: '+score,W/2,330);
  if(score>=hiScore&&score>0){
    ctx.save();ctx.shadowColor='#FFD93D';ctx.shadowBlur=18;
    ctx.fillStyle='#FFD93D';ctx.font='bold 18px Arial';
    ctx.fillText('🏆 NEW HIGH SCORE!',W/2,368);ctx.restore();
  }
  const bw=162,bh=52;
  rr(W/2-bw/2,410,bw,bh,15,'#6BCB77','#4a9a58',2);
  ctx.fillStyle='#1a1a2e';ctx.font='bold 20px Arial';ctx.fillText('PLAY AGAIN',W/2,436);
  btnRects.again={x:W/2-bw/2,y:410,w:bw,h:bh};
  rr(W/2-bw/2,482,bw,bh,15,'rgba(100,100,150,.8)','#8888aa',2);
  ctx.fillStyle='#fff';ctx.fillText('MAIN MENU',W/2,508);
  btnRects.menu={x:W/2-bw/2,y:482,w:bw,h:bh};
}

// ─── Update ─────────────────────────────────────────────────────────────────
function update(dt){
  frame++;
  for(const s of STARS){
    s.x+=s.vx;s.y+=s.vy;
    if(s.y>H+4){s.y=-4;s.x=Math.random()*W;}
    if(s.x<0||s.x>W)s.x=Math.random()*W;
  }
  if(screen!==SCR.GAME)return;
  // Shake
  if(shakeTime>0){shakeTime-=dt*1000;shakeX=(Math.random()-.5)*shakeMag*2;shakeY=(Math.random()-.5)*shakeMag*2;}
  else{shakeX=0;shakeY=0;}
  // Cannon move
  if(leftBtn)cannonX=Math.max(22,cannonX-4);
  if(rightBtn)cannonX=Math.min(W-22,cannonX+4);
  if(recoil>0)recoil=Math.max(0,recoil-.5);
  // Shoot
  const rate=rfActive?.15:.5;
  shootTimer+=dt;
  if(shootTimer>=rate){shootTimer=0;fire();}
  // Timers
  if(rfActive){rfTimer-=dt;if(rfTimer<=0)rfActive=false;}
  if(triActive){triTimer-=dt;if(triTimer<=0)triActive=false;}
  if(shActive){shTimer-=dt;if(shTimer<=0)shActive=false;}
  if(mxActive){mxTimer-=dt;if(mxTimer<=0)mxActive=false;}
  if(combo>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1;}}
  // Spawn
  if(Math.random()<.026+level*.005)spawnBlob();
  // Blobs
  for(let i=blobs.length-1;i>=0;i--){
    const b=blobs[i];
    b.wobble+=.065;b.flash=Math.max(0,b.flash-dt*5);
    if(b.dying){
      b.dTimer+=dt;b.dScale=Math.max(0,1-b.dTimer*4);
      if(b.dScale<=0)blobs.splice(i,1);
      continue;
    }
    b.y+=b.spd;
    if(b.zz){b.zzPhase+=.045;b.x+=Math.sin(b.zzPhase)*2;b.x=Math.max(b.sz,Math.min(W-b.sz,b.x));}
    if(b.y>H-48){
      blobs.splice(i,1);
      if(shActive){shActive=false;shTimer=0;spawnPopup(W/2,H-64,'BLOCKED!','#00BCD4');}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }
  // Boss
  if(bossPresent&&boss){
    boss.wobble+=.045;boss.flash=Math.max(0,boss.flash-dt*5);
    if(boss.dying){
      boss.dTimer+=dt;boss.dScale=Math.max(0,1-boss.dTimer*3);
      if(boss.dScale<=0){boss=null;bossPresent=false;}
    } else {
      if(!boss.arrived){boss.y+=2.5;if(boss.y>=boss.targetY)boss.arrived=true;}
      else{
        boss.x+=boss.spd*boss.dir;
        if(boss.x>W-boss.sz||boss.x<boss.sz)boss.dir*=-1;
        boss.spd=Math.min(2.8,.5+((boss.maxHp-boss.hp)/boss.maxHp)*2.3);
      }
      boss.sTimer-=dt;
      if(boss.sTimer<=0){
        boss.sTimer=2.5+(Math.random()-.5)*.5;
        bossShots.push({x:boss.x,y:boss.y+boss.sz,vx:(Math.random()-.5)*3.2,vy:3.8,r:8});
      }
      if(boss.y>H-62){
        bossPresent=false;boss=null;
        if(shActive){shActive=false;shTimer=0;}
        else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
      }
    }
  }
  // Boss shots
  for(let i=bossShots.length-1;i>=0;i--){
    const p=bossShots[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.y>H||p.x<0||p.x>W){bossShots.splice(i,1);continue;}
    const dx=p.x-cannonX,dy=p.y-(RAIL_Y-10);
    if(Math.sqrt(dx*dx+dy*dy)<p.r+22){
      bossShots.splice(i,1);
      if(shActive){shActive=false;shTimer=0;}
      else{lives--;sfxLoseLife();if(lives<=0)gameOver();}
    }
  }
  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20){bullets.splice(i,1);continue;}
    let hit=false;
    if(bossPresent&&boss&&!boss.dying){
      const dx=b.x-boss.x,dy=b.y-boss.y;
      if(Math.sqrt(dx*dx+dy*dy)<boss.sz+b.r){
        bullets.splice(i,1);boss.hp--;boss.flash=.22;
        spawnParticles(b.x,b.y,'#FF6B6B',3);
        if(boss.hp<=0){
          addKill(500,boss.x,boss.y);boss.dying=true;
          spawnParticles(boss.x,boss.y,'#C0392B',16);dropPowerup(boss.x,boss.y);
        }
        hit=true;
      }
    }
    if(hit)continue;
    for(let j=blobs.length-1;j>=0;j--){
      const bl=blobs[j];
      if(bl.dying)continue;
      const dx=b.x-bl.x,dy=b.y-bl.y;
      if(Math.sqrt(dx*dx+dy*dy)<bl.sz+b.r){
        bullets.splice(i,1);bl.hp--;bl.flash=.28;
        if(bl.hp<=0){
          bl.dying=true;sfxSquish();
          spawnParticles(bl.x,bl.y,bl.col,6+Math.floor(Math.random()*4));
          dropPowerup(bl.x,bl.y);addKill(bl.pts,bl.x,bl.y);
        }
        hit=true;break;
      }
    }
  }
  // Powerups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.y+=p.vy;p.life-=p.decay;
    if(p.y>H||p.life<=0){powerups.splice(i,1);continue;}
    const dx=p.x-cannonX,dy=p.y-(RAIL_Y-10);
    if(Math.sqrt(dx*dx+dy*dy)<p.r+26){
      applyPowerup(p.type);spawnPopup(p.x,p.y,p.type.toUpperCase(),'#00BCD4');
      powerups.splice(i,1);
    }
  }
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
  // Popups
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];p.y+=p.vy;p.life-=.024;
    if(p.life<=0)popups.splice(i,1);
  }
}

function drawGame(){
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBg();
  for(const b of blobs)drawBlob(b);
  if(bossPresent&&boss)drawBoss(boss);
  // bullets
  for(const b of bullets){
    ctx.save();ctx.shadowColor='#c9a8ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle='#ddbcff';ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
  // boss shots
  for(const p of bossShots){
    ctx.save();ctx.shadowColor='#FF6B6B';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='#FF6B6B';ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
  // powerups
  for(const p of powerups){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.shadowColor=p.col;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();ctx.shadowBlur=0;
    ctx.font='bold 11px Arial';ctx.fillStyle='#fff';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.icon,p.x,p.y);ctx.restore();
  }
  // particles
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();ctx.restore();
  }
  // popups
  for(const p of popups){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;ctx.font='bold 16px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.txt,p.x,p.y);ctx.restore();
  }
  // combo
  if(combo>=2){
    const fade=Math.min(1,comboTimer/.55);
    ctx.save();ctx.globalAlpha=fade;
    ctx.fillStyle='#FF6B6B';ctx.font='bold '+(24+combo*2)+'px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(combo+'× COMBO!',W/2,H/2-24);ctx.restore();
  }
  drawRail();drawCannon();drawHUD();
  ctx.restore();
}

// ─── Loop ───────────────────────────────────────────────────────────────────
let lastT=0;
function loop(now){
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;
  update(dt);ctx.clearRect(0,0,W,H);
  if(screen===SCR.TITLE)drawTitle();
  else if(screen===SCR.GAME)drawGame();
  else if(screen===SCR.PAUSE){drawGame();drawPause();}
  else if(screen===SCR.OVER)drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
</script>
